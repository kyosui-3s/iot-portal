server {
    listen 80;
    server_name sub.3sec-demo.com _;

    more_set_headers "Server: Apache/2.4.49 (Unix)";

    location /api/ {
        proxy_pass http://127.0.0.1:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location / {
        root /opt/iot-portal/static;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    location /static/ {
        alias /opt/iot-portal/static/;
        autoindex on;
    }

    location ~ /\. {
    }

    access_log /var/log/nginx/iot-portal-access.log;
    error_log /var/log/nginx/iot-portal-error.log;
}
