<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IoT Device Portal - 3sec Technologies</title>
  <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
  <script src="https://unpkg.com/vue-router@4/dist/vue-router.global.prod.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    .stat-card { position:relative; overflow:hidden; }
    .stat-card::after { content:''; position:absolute; top:-20px; right:-20px; width:80px; height:80px; border-radius:50%; background:rgba(255,255,255,0.15); }
    .bar { border-radius:4px 4px 0 0; transition:height 0.5s; }
    .stripe-table tbody tr:nth-child(even) { background-color: #f3f4f6; }
    .stripe-table tbody tr:nth-child(odd) { background-color: #ffffff; }
    .stripe-detail tr:nth-child(even) td, .stripe-detail tr:nth-child(even) th { background-color: #f5f3ff; }
    .stripe-detail tr:nth-child(odd) td, .stripe-detail tr:nth-child(odd) th { background-color: #ffffff; }
  </style>
</head>
<body class="min-h-screen">
<div id="app"></div>

<!-- サイトフッター -->
<footer style="border-top:1px solid #e5e7eb;padding:16px 20px;text-align:center;font-size:12px;color:#9ca3af;margin-top:40px">
  <p>&copy; 2025 3sec Technologies, Inc. |
    <a href="/dashboard" style="color:#6b7280;margin:0 4px">ダッシュボード</a> |
    <a href="/devices" style="color:#6b7280;margin:0 4px">デバイス一覧</a> |
    <a href="/devices/search" style="color:#6b7280;margin:0 4px">デバイス検索（旧）</a> |
    <a href="/devices/lookup" style="color:#6b7280;margin:0 4px">ID検索</a> |
    <a href="/tools/ping" style="color:#6b7280;margin:0 4px">Ping診断</a> |
    <a href="/tools/fetch" style="color:#6b7280;margin:0 4px">FW更新</a> |
    <a href="/contact" style="color:#6b7280;margin:0 4px">お問い合わせ</a> |
    <a href="/graphql" style="color:#6b7280;margin:0 4px">API</a> |
    <a href="/partner/" style="color:#6b7280;margin:0 4px">パートナーポータル</a>
  </p>
</footer>

<script>
const { createApp, ref, reactive, onMounted, watch } = Vue
const { createRouter, createWebHistory, useRoute, useRouter } = VueRouter

/* ── 共通ヘッダー ── */
const AppHeader = {
  props: ['current'],
  template: `
  <header class="bg-gradient-to-r from-blue-900 to-blue-700 sticky top-0 z-50 shadow-lg">
    <div class="max-w-6xl mx-auto px-6 h-14 flex items-center justify-between">
      <div class="flex items-center gap-8">
        <router-link to="/dashboard" class="font-bold text-lg text-white tracking-wide">🏭 IoT Portal</router-link>
        <nav class="flex gap-1">
          <router-link to="/dashboard" class="px-3 py-1.5 rounded text-sm transition" :class="current==='dashboard'?'bg-white/20 text-white font-semibold':'text-blue-200 hover:bg-white/10 hover:text-white'">ダッシュボード</router-link>
          <router-link to="/devices" class="px-3 py-1.5 rounded text-sm transition" :class="current==='devices'?'bg-white/20 text-white font-semibold':'text-blue-200 hover:bg-white/10 hover:text-white'">デバイス一覧</router-link>
          <router-link to="/contact" class="px-3 py-1.5 rounded text-sm transition" :class="current==='contact'?'bg-white/20 text-white font-semibold':'text-blue-200 hover:bg-white/10 hover:text-white'">お問い合わせ</router-link>
          <a href="/partner/" class="px-3 py-1.5 rounded text-sm text-blue-200 hover:bg-white/10 hover:text-white transition">パートナー</a>
        </nav>
      </div>
      <form @submit.prevent="$emit('logout')" style="margin:0"><button type="submit" class="text-blue-300 hover:text-white text-sm">ログアウト</button></form>
    </div>
  </header>`
}

/* ══════════════════════════════ LOGIN ══════════════════════════════ */
const LoginPage = {
  template: `
  <div class="min-h-screen flex items-center justify-center bg-gradient-to-br from-slate-900 via-blue-900 to-slate-900">
    <div class="absolute inset-0 opacity-20" style="background-image:radial-gradient(circle at 20% 50%,#3b82f6 0%,transparent 50%),radial-gradient(circle at 80% 50%,#6366f1 0%,transparent 50%)"></div>
    <div class="relative w-full max-w-sm mx-4">
      <div class="text-center mb-6">
        <div class="inline-flex items-center justify-center w-14 h-14 rounded-xl bg-blue-500 shadow-lg shadow-blue-500/30 mb-3"><span class="text-2xl">🏭</span></div>
        <h1 class="text-2xl font-bold text-white">IoT Device Portal</h1>
        <p class="text-blue-300 text-sm mt-1">Smart Factory Management System</p>
      </div>
      <div class="bg-white rounded-2xl p-8 shadow-2xl">
        <h2 class="text-lg font-bold text-gray-800 mb-5">ログイン</h2>
        <form @submit.prevent="doLogin">
          <div class="mb-4">
            <label class="block text-sm font-medium text-gray-600 mb-1.5">メールアドレス</label>
            <input v-model="email" type="text" placeholder="admin@3sec-demo.com" class="w-full px-4 py-2.5 bg-gray-50 border-2 border-gray-200 rounded-lg text-sm focus:outline-none focus:border-blue-500 focus:bg-white transition">
          </div>
          <div class="mb-5">
            <label class="block text-sm font-medium text-gray-600 mb-1.5">パスワード</label>
            <input v-model="password" type="password" placeholder="••••••••" class="w-full px-4 py-2.5 bg-gray-50 border-2 border-gray-200 rounded-lg text-sm focus:outline-none focus:border-blue-500 focus:bg-white transition">
          </div>
          <div v-if="error" class="mb-4 p-3 rounded-lg bg-red-50 border-2 border-red-200 text-red-600 text-sm" v-html="error"></div>
          <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-lg text-sm transition shadow-lg shadow-blue-500/25">ログイン</button>
        </form>
      </div>
    </div>
  </div>`,
  setup() {
    const email = ref(''), password = ref(''), error = ref('')
    const router = useRouter()
    async function doLogin() {
      const res = await fetch('/api/login', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({email:email.value,password:password.value}) })
      const data = await res.json()
      if (data.success) { localStorage.setItem('user',JSON.stringify(data.user)); router.push('/dashboard') }
      else { error.value = data.error }
    }
    return { email, password, error, doLogin }
  }
}

/* ══════════════════════════════ DASHBOARD ══════════════════════════════ */
const DashboardPage = {
  components: { AppHeader },
  template: `
  <div class="bg-slate-100 min-h-screen">
    <AppHeader current="dashboard" @logout="logout" />
    <div class="bg-gradient-to-r from-blue-800 to-blue-600 px-6 py-6">
      <div class="max-w-6xl mx-auto flex justify-between items-center">
        <div><h1 class="text-xl font-bold text-white">ダッシュボード</h1><p class="text-blue-200 text-sm mt-0.5">リアルタイムモニタリング</p></div>
        <span class="px-4 py-1.5 rounded-full bg-emerald-500/20 text-emerald-300 text-xs font-bold border border-emerald-400/30">● システム正常</span>
      </div>
    </div>
    <main class="max-w-6xl mx-auto px-6 -mt-4">
      <div class="grid grid-cols-4 gap-4 mb-6">
        <div class="stat-card rounded-xl p-5 shadow-lg bg-gradient-to-br from-blue-500 to-blue-700">
          <p class="text-xs font-bold text-blue-100 uppercase tracking-wider mb-2">稼働デバイス</p>
          <p class="text-4xl font-black text-white">{{stats.online}}</p>
          <p class="text-blue-200 text-xs mt-1">正常稼働中</p>
        </div>
        <div class="stat-card rounded-xl p-5 shadow-lg bg-gradient-to-br from-amber-400 to-amber-600">
          <p class="text-xs font-bold text-amber-100 uppercase tracking-wider mb-2">アラート</p>
          <p class="text-4xl font-black text-white">{{stats.warning}}</p>
          <p class="text-amber-100 text-xs mt-1">要確認</p>
        </div>
        <div class="stat-card rounded-xl p-5 shadow-lg bg-gradient-to-br from-red-500 to-red-700">
          <p class="text-xs font-bold text-red-200 uppercase tracking-wider mb-2">オフライン</p>
          <p class="text-4xl font-black text-white">{{stats.offline}}</p>
          <p class="text-red-200 text-xs mt-1">停止中</p>
        </div>
        <div class="stat-card rounded-xl p-5 shadow-lg bg-gradient-to-br from-emerald-500 to-emerald-700">
          <p class="text-xs font-bold text-emerald-100 uppercase tracking-wider mb-2">合計</p>
          <p class="text-4xl font-black text-white">{{stats.total}}</p>
          <p class="text-emerald-100 text-xs mt-1">登録デバイス</p>
        </div>
      </div>
      <div class="grid grid-cols-5 gap-4">
        <div class="col-span-3 bg-white rounded-xl p-6 shadow-lg border border-gray-200">
          <h3 class="text-sm font-bold text-gray-700 mb-4">デバイス稼働推移（7日間）</h3>
          <div class="flex items-end gap-3 h-40">
            <div v-for="(h,i) in [85,92,78,95,88,60,55]" :key="i" class="flex-1 flex flex-col items-center gap-1">
              <div class="bar w-full bg-blue-400" :style="{height: Math.max(h, 20)+'%', minHeight:'20px'}"></div>
              <span class="text-xs font-bold text-gray-400">{{['月','火','水','木','金','土','日'][i]}}</span>
            </div>
          </div>
        </div>
        <div class="col-span-2 bg-white rounded-xl shadow-lg overflow-hidden border border-gray-200">
          <div class="px-5 py-3 bg-gray-50 border-b border-gray-200 flex justify-between items-center">
            <h3 class="text-sm font-bold text-gray-700">デバイス一覧</h3>
            <router-link to="/devices" class="text-blue-400 text-xs font-medium hover:underline">すべて →</router-link>
          </div>
          <div class="divide-y divide-gray-100">
            <router-link v-for="d in devices" :key="d.id" :to="'/devices/'+d.id" class="flex items-center justify-between px-5 py-3 hover:bg-gray-50 transition" :class="d.status==='online'?'border-l-4 border-emerald-400':d.status==='warning'?'border-l-4 border-amber-400':'border-l-4 border-red-400'">
              <span class="text-sm font-medium text-gray-700">{{d.name}}</span>
              <span class="px-2.5 py-1 rounded-full text-xs font-bold" :class="d.status==='online'?'bg-emerald-500 text-white':d.status==='warning'?'bg-amber-400 text-white':'bg-red-500 text-white'">{{d.status}}</span>
            </router-link>
          </div>
        </div>
      </div>
    </main>
  </div>`,
  setup() {
    const devices = ref([])
    const stats = reactive({online:0,warning:0,offline:0,total:0})
    onMounted(async () => {
      const res = await fetch('/graphql', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({query:'{ devices { id name type location status ip_address firmware } }'}) })
      const json = await res.json()
      devices.value = json.data?.devices || []
      devices.value.forEach(d => { stats.total++; if(d.status==='online') stats.online++; else if(d.status==='warning') stats.warning++; else stats.offline++ })
    })
    function logout() { localStorage.removeItem('user'); window.location.href='/' }
    return { devices, stats, logout }
  }
}

/* ══════════════════════════════ DEVICES (一覧) ══════════════════════════════ */
const DevicesPage = {
  components: { AppHeader },
  template: `
  <div class="bg-gray-100 min-h-screen">
    <AppHeader current="devices" @logout="logout" />
    <div class="bg-gradient-to-r from-emerald-700 to-teal-600 px-6 py-6">
      <div class="max-w-6xl mx-auto">
        <h1 class="text-xl font-bold text-white">デバイス一覧</h1>
        <p class="text-emerald-200 text-sm mt-0.5">登録済みデバイスの管理と検索</p>
      </div>
    </div>
    <main class="max-w-6xl mx-auto px-6 -mt-4">
      <div class="bg-white rounded-xl shadow-lg overflow-hidden border border-gray-200">
        <div class="px-5 py-4 bg-gradient-to-r from-emerald-50 to-teal-50 border-b-2 border-emerald-200 flex items-center gap-3">
          <input v-model="search" @keyup.enter="doSearch" type="text" placeholder="デバイス名・設置場所で検索..." class="flex-1 px-4 py-2.5 bg-white border-2 border-emerald-300 rounded-lg text-sm focus:outline-none focus:border-emerald-500 transition shadow-sm">
          <button @click="doSearch" class="px-6 py-2.5 bg-emerald-600 text-white rounded-lg text-sm font-bold hover:bg-emerald-700 transition shadow-md">検索</button>
        </div>
        <div v-if="errorHtml" class="mx-5 mt-4 p-3 bg-red-50 border-2 border-red-200 rounded-lg text-red-600 text-sm" v-html="errorHtml"></div>
        <table class="w-full text-sm stripe-table">
          <thead><tr class="bg-gray-800 text-white">
            <th class="text-left px-5 py-3 font-semibold">ID</th>
            <th class="text-left px-5 py-3 font-semibold">名称</th>
            <th class="text-left px-5 py-3 font-semibold">種別</th>
            <th class="text-left px-5 py-3 font-semibold">設置場所</th>
            <th class="text-left px-5 py-3 font-semibold">ステータス</th>
            <th class="text-left px-5 py-3 font-semibold">IP</th>
            <th class="text-left px-5 py-3 font-semibold">操作</th>
          </tr></thead>
          <tbody>
            <tr v-for="d in devices" :key="d.id" class="hover:bg-emerald-50 transition border-b border-gray-100">
              <td class="px-5 py-3 text-gray-500 font-mono font-bold">{{d.id}}</td>
              <td class="px-5 py-3 font-bold text-gray-800">{{d.name}}</td>
              <td class="px-5 py-3 text-gray-600">{{d.type}}</td>
              <td class="px-5 py-3 text-gray-600">{{d.location}}</td>
              <td class="px-5 py-3"><span class="px-3 py-1.5 rounded-full text-xs font-extrabold tracking-wide" :class="d.status==='online'?'bg-emerald-500 text-white':d.status==='warning'?'bg-amber-400 text-white':'bg-red-500 text-white'">{{d.status.toUpperCase()}}</span></td>
              <td class="px-5 py-3 font-mono text-xs text-gray-500">{{d.ip_address}}</td>
              <td class="px-5 py-3"><router-link :to="'/devices/'+d.id" class="text-emerald-600 hover:text-emerald-800 font-semibold text-xs underline">詳細 →</router-link></td>
            </tr>
          </tbody>
        </table>
      </div>
    </main>
  </div>`,
  setup() {
    const search = ref(''), devices = ref([]), errorHtml = ref('')
    async function doSearch() {
      errorHtml.value = ''
      const q = search.value ? '{ devices(search: "'+search.value+'") { id name type location status ip_address firmware } }' : '{ devices { id name type location status ip_address firmware } }'
      const res = await fetch('/graphql', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({query:q}) })
      const json = await res.json()
      if(json.errors) { errorHtml.value = json.errors.map(e=>e.message).join('<br>'); devices.value=[] }
      else { devices.value = json.data?.devices || [] }
    }
    onMounted(doSearch)
    function logout() { localStorage.removeItem('user'); window.location.href='/' }
    return { search, devices, errorHtml, doSearch, logout }
  }
}

/* ══════════════════════════════ DEVICE DETAIL (/devices/:id) ══════════════════════════════ */
const DeviceDetailPage = {
  components: { AppHeader },
  template: `
  <div class="bg-slate-100 min-h-screen">
    <AppHeader current="devices" @logout="logout" />
    <div class="bg-gradient-to-r from-violet-700 to-purple-600 px-6 py-6">
      <div class="max-w-4xl mx-auto">
        <div class="text-sm text-violet-200 mb-1">
          <router-link to="/devices" class="hover:text-white">デバイス一覧</router-link>
          <span class="mx-2">/</span>
          <span class="text-white">デバイス詳細</span>
        </div>
        <h1 class="text-xl font-bold text-white">デバイス詳細</h1>
      </div>
    </div>
    <main class="max-w-4xl mx-auto px-6 -mt-4">
      <div v-if="errorHtml" class="mb-6 p-4 bg-red-50 border-2 border-red-200 rounded-lg text-red-600 text-sm" v-html="errorHtml"></div>

      <div v-if="device" class="space-y-5">
        <div class="bg-white rounded-xl shadow-lg overflow-hidden border border-violet-100">
          <div class="px-5 py-4 bg-gradient-to-r from-violet-600 to-purple-500">
            <div class="flex items-center justify-between">
              <h2 class="font-bold text-white text-lg">{{device.name}}</h2>
              <span class="px-3 py-1.5 rounded-full text-xs font-extrabold" :class="device.status==='online'?'bg-emerald-400 text-white':device.status==='warning'?'bg-amber-400 text-white':'bg-red-400 text-white'">{{device.status.toUpperCase()}}</span>
            </div>
          </div>
          <table class="w-full text-sm stripe-detail">
            <tr class="border-b border-violet-100"><th class="text-left px-5 py-3 text-violet-700 w-36 font-bold">ID</th><td class="px-5 py-3 font-mono font-bold text-gray-700">{{device.id}}</td></tr>
            <tr class="border-b border-violet-100"><th class="text-left px-5 py-3 text-violet-700 font-bold">種別</th><td class="px-5 py-3 text-gray-700">{{device.type}}</td></tr>
            <tr class="border-b border-violet-100"><th class="text-left px-5 py-3 text-violet-700 font-bold">設置場所</th><td class="px-5 py-3 text-gray-700">{{device.location}}</td></tr>
            <tr class="border-b border-violet-100"><th class="text-left px-5 py-3 text-violet-700 font-bold">IPアドレス</th><td class="px-5 py-3 font-mono font-bold text-violet-700">{{device.ip_address}}</td></tr>
            <tr><th class="text-left px-5 py-3 text-violet-700 font-bold">ファームウェア</th><td class="px-5 py-3 text-gray-700">{{device.firmware}}</td></tr>
          </table>
        </div>

        <div class="bg-white rounded-xl shadow-lg p-5 border border-violet-100">
          <h3 class="font-bold text-gray-800 mb-3 text-base">📋 デバイスログ</h3>
          <p class="text-sm text-gray-500 mb-3">このデバイスから収集されたシステムログを確認できます。</p>
          <router-link :to="'/devices/'+device.id+'/logs'" class="inline-block px-5 py-2.5 bg-violet-600 text-white rounded-lg text-sm font-bold hover:bg-violet-700 transition shadow-md">ログを見る →</router-link>
        </div>
      </div>
    </main>
  </div>`,
  setup() {
    const route = useRoute()
    const device = ref(null), errorHtml = ref('')
    async function fetchDevice() {
      errorHtml.value=''; device.value=null
      const res = await fetch('/api/device/'+route.params.id)
      const json = await res.json()
      if(json.error) { errorHtml.value=json.error } else { device.value=json }
    }
    onMounted(fetchDevice)
    watch(() => route.params.id, fetchDevice)
    function logout() { localStorage.removeItem('user'); window.location.href='/' }
    return { device, errorHtml, logout }
  }
}

/* ══════════════════════════════ DEVICE LOGS (/devices/:id/logs) ══════════════════════════════ */
/* VULN: Stored XSS - ログメッセージを v-html でレンダリング */

  template: `
  <div class="bg-slate-100 min-h-screen">

          <router-link :to="'/devices/'+deviceId" class="hover:text-white">デバイス詳細</router-link>

              <td class="px-5 py-3 text-xs text-gray-500 font-mono">{{l.created_at}}</td>
              <td class="px-5 py-3"><router-link :to="'/devices/'+deviceId+'/logs/'+l.id" class="text-violet-600 hover:text-violet-800 font-semibold text-xs underline">詳細</router-link></td>
            </tr>
            <tr v-if="!logs.length"><td colspan="5" class="px-5 py-8 text-center text-gray-400">ログがありません</td></tr>
          </tbody>
        </table>
      </div>

      <!-- ログ追加フォーム（Stored XSS 投入口） -->
      <div class="bg-white rounded-xl shadow-lg p-5 mt-6 border border-violet-100">
        <h3 class="font-bold text-gray-800 mb-3">📝 手動ログ追加</h3>
        <p class="text-xs text-gray-500 mb-3">運用メモや手動投入したいログを追加できます。</p>
        <div class="flex gap-3">
          <select v-model="newLevel" class="px-3 py-2.5 bg-gray-50 border-2 border-gray-200 rounded-lg text-sm">
            <option>INFO</option><option>WARNING</option><option>ERROR</option>
          </select>
          <input v-model="newMessage" type="text" placeholder="ログメッセージ" class="flex-1 px-4 py-2.5 bg-gray-50 border-2 border-gray-200 rounded-lg text-sm">
          <button @click="addLog" class="px-5 py-2.5 bg-violet-600 text-white rounded-lg text-sm font-bold hover:bg-violet-700 transition">追加</button>
        </div>
      </div>
    </main>
  </div>`,
  setup() {
    const route = useRoute()
    const deviceId = ref(route.params.id)
    const keyword = ref(''), logs = ref([]), errorHtml = ref('')
    const newLevel = ref('INFO'), newMessage = ref('')

    async function loadLogs() {
      errorHtml.value = ''
      const url = '/api/device/'+deviceId.value+'/logs'+(keyword.value?'?q='+encodeURIComponent(keyword.value):'')
      const res = await fetch(url)
      const json = await res.json()
      if(json.error) { errorHtml.value = json.error+'<br><code>'+(json.sql||'')+'</code>'; logs.value=[] }
      else { logs.value = json.logs || [] }
    }
    async function addLog() {
      if(!newMessage.value) return
      await fetch('/api/device/'+deviceId.value+'/logs', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({level:newLevel.value, message:newMessage.value}) })
      newMessage.value = ''
      loadLogs()
    }
    onMounted(loadLogs)
    watch(() => route.params.id, v => { deviceId.value = v; loadLogs() })
    function logout() { localStorage.removeItem('user'); window.location.href='/' }
    return { deviceId, keyword, logs, errorHtml, newLevel, newMessage, loadLogs, addLog, logout }
  }
}
