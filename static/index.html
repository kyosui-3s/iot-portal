<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IoT Device Portal - 3sec Technologies</title>
  <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
  <script src="https://unpkg.com/vue-router@4/dist/vue-router.global.prod.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen">
<div id="app"></div>

<!-- サイトフッター（クローラー用リンク含む） -->
<footer style="border-top:1px solid #e5e7eb;padding:16px 20px;text-align:center;font-size:12px;color:#9ca3af;margin-top:40px">
  <p>&copy; 2025 3sec Technologies, Inc. |
    <a href="/devices/search" style="color:#6b7280;margin:0 4px">デバイス検索</a> |
    <a href="/tools/ping" style="color:#6b7280;margin:0 4px">ネットワーク診断</a> |
    <a href="/tools/fetch" style="color:#6b7280;margin:0 4px">FW更新チェック</a> |
    <a href="/download" style="color:#6b7280;margin:0 4px">ダウンロード</a> |
    <a href="/graphql" style="color:#6b7280;margin:0 4px">API</a>
  </p>
</footer>

<script>
const { createApp, ref, reactive, onMounted } = Vue
const { createRouter, createWebHistory } = VueRouter

/* ── 共通ヘッダーコンポーネント ── */
const AppHeader = {
  props: ['current'],
  template: `
  <header class="bg-white border-b border-gray-200 sticky top-0 z-50 shadow-sm">
    <div class="max-w-6xl mx-auto px-6 h-14 flex items-center justify-between">
      <div class="flex items-center gap-8">
        <router-link to="/dashboard" class="font-bold text-lg text-blue-800">IoT Portal</router-link>
        <nav class="flex gap-5 text-sm">
          <router-link to="/dashboard" :class="current==='dashboard'?'text-blue-600 font-semibold border-b-2 border-blue-500 pb-0.5':'text-gray-500 hover:text-gray-800'">ダッシュボード</router-link>
          <router-link to="/devices" :class="current==='devices'?'text-blue-600 font-semibold border-b-2 border-blue-500 pb-0.5':'text-gray-500 hover:text-gray-800'">デバイス一覧</router-link>
          <router-link to="/contact" :class="current==='contact'?'text-blue-600 font-semibold border-b-2 border-blue-500 pb-0.5':'text-gray-500 hover:text-gray-800'">お問い合わせ</router-link>
        </nav>
      </div>
      <form @submit.prevent="$emit('logout')" style="margin:0"><button type="submit" class="text-gray-400 hover:text-gray-600 text-sm">ログアウト</button></form>
    </div>
  </header>`
}

/* ══════════════════════════════
   LOGIN
   ══════════════════════════════ */
const LoginPage = {
  template: `
  <div class="min-h-screen flex items-center justify-center" style="background:linear-gradient(135deg,#1e3a5f,#2563eb)">
    <div class="w-full max-w-sm mx-4">
      <div class="text-center mb-6">
        <h1 class="text-2xl font-bold text-white">IoT Device Portal</h1>
        <p class="text-blue-200 text-sm mt-1">Smart Factory Management System</p>
      </div>
      <div class="bg-white rounded-xl p-8 shadow-xl">
        <h2 class="text-lg font-semibold text-gray-800 mb-5">ログイン</h2>
        <form @submit.prevent="doLogin">
          <div class="mb-4">
            <label class="block text-sm text-gray-600 mb-1">メールアドレス</label>
            <input v-model="email" type="text" placeholder="admin@3sec-demo.com" class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-400">
          </div>
          <div class="mb-5">
            <label class="block text-sm text-gray-600 mb-1">パスワード</label>
            <input v-model="password" type="password" placeholder="••••••••" class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-400">
          </div>
          <div v-if="error" class="mb-4 p-3 rounded-lg bg-red-50 border border-red-200 text-red-600 text-sm" v-html="error"></div>
          <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-2.5 rounded-lg text-sm transition">ログイン</button>
        </form>
      </div>
    </div>
  </div>`,
  setup() {
    const email = ref(''), password = ref(''), error = ref('')
    const router = VueRouter.useRouter()
    async function doLogin() {
      const res = await fetch('/api/login', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({email:email.value,password:password.value}) })
      const data = await res.json()
      if (data.success) { localStorage.setItem('user',JSON.stringify(data.user)); router.push('/dashboard') }
      else { error.value = data.error }
    }
    return { email, password, error, doLogin }
  }
}

/* ══════════════════════════════
   DASHBOARD - KPIカード + デバイスリスト
   ══════════════════════════════ */
const DashboardPage = {
  components: { AppHeader },
  template: `
  <div>
    <AppHeader current="dashboard" @logout="logout" />
    <main class="max-w-6xl mx-auto px-6 py-8">
      <h1 class="text-xl font-bold text-gray-900 mb-6">ダッシュボード</h1>
      <div class="grid grid-cols-4 gap-4 mb-8">
        <div class="bg-white rounded-lg border border-gray-200 p-5"><p class="text-xs text-gray-500 mb-1">稼働デバイス</p><p class="text-2xl font-bold text-blue-600">{{stats.online}}</p></div>
        <div class="bg-white rounded-lg border border-gray-200 p-5"><p class="text-xs text-gray-500 mb-1">アラート</p><p class="text-2xl font-bold text-amber-500">{{stats.warning}}</p></div>
        <div class="bg-white rounded-lg border border-gray-200 p-5"><p class="text-xs text-gray-500 mb-1">オフライン</p><p class="text-2xl font-bold text-red-500">{{stats.offline}}</p></div>
        <div class="bg-white rounded-lg border border-gray-200 p-5"><p class="text-xs text-gray-500 mb-1">合計</p><p class="text-2xl font-bold text-gray-700">{{stats.total}}</p></div>
      </div>
      <div class="bg-white rounded-lg border border-gray-200">
        <div class="px-5 py-4 border-b border-gray-100 flex justify-between items-center">
          <h2 class="font-semibold text-gray-800">デバイス一覧</h2>
          <router-link to="/devices" class="text-blue-600 text-sm hover:underline">すべて見る →</router-link>
        </div>
        <table class="w-full text-sm">
          <thead class="bg-gray-50"><tr>
            <th class="text-left px-5 py-2.5 text-gray-500 font-medium">名称</th>
            <th class="text-left px-5 py-2.5 text-gray-500 font-medium">設置場所</th>
            <th class="text-left px-5 py-2.5 text-gray-500 font-medium">ステータス</th>
            <th class="text-left px-5 py-2.5 text-gray-500 font-medium"></th>
          </tr></thead>
          <tbody class="divide-y divide-gray-50">
            <tr v-for="d in devices" :key="d.id" class="hover:bg-gray-50">
              <td class="px-5 py-3 font-medium text-gray-800">{{d.name}}</td>
              <td class="px-5 py-3 text-gray-500">{{d.location}}</td>
              <td class="px-5 py-3"><span class="px-2 py-0.5 rounded-full text-xs font-medium" :class="d.status==='online'?'bg-green-100 text-green-700':d.status==='warning'?'bg-amber-100 text-amber-700':'bg-gray-100 text-gray-500'">{{d.status}}</span></td>
              <td class="px-5 py-3"><router-link :to="'/device?id='+d.id" class="text-blue-500 text-xs hover:underline">詳細</router-link></td>
            </tr>
          </tbody>
        </table>
      </div>
    </main>
  </div>`,
  setup() {
    const devices = ref([])
    const stats = reactive({online:0,warning:0,offline:0,total:0})
    onMounted(async () => {
      const res = await fetch('/graphql', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({query:'{ devices { id name type location status ip_address firmware } }'}) })
      const json = await res.json()
      devices.value = json.data?.devices || []
      devices.value.forEach(d => { stats.total++; if(d.status==='online') stats.online++; else if(d.status==='warning') stats.warning++; else stats.offline++ })
    })
    function logout() { localStorage.removeItem('user'); window.location.href='/' }
    return { devices, stats, logout }
  }
}

/* ══════════════════════════════
   DEVICES - デバイス一覧（検索付き）
   ══════════════════════════════ */
const DevicesPage = {
  components: { AppHeader },
  template: `
  <div>
    <AppHeader current="devices" @logout="logout" />
    <main class="max-w-6xl mx-auto px-6 py-8">
      <div class="flex justify-between items-center mb-6">
        <h1 class="text-xl font-bold text-gray-900">デバイス一覧</h1>
        <div class="flex gap-3">
          <input v-model="search" @keyup.enter="doSearch" type="text" placeholder="デバイス名で検索..." class="px-3 py-2 border border-gray-300 rounded-lg text-sm w-56 focus:outline-none focus:ring-2 focus:ring-blue-400">
          <button @click="doSearch" class="px-4 py-2 bg-blue-600 text-white rounded-lg text-sm font-medium hover:bg-blue-700">検索</button>
        </div>
      </div>
      <div v-if="errorHtml" class="mb-4 p-3 bg-red-50 border border-red-200 rounded-lg text-red-600 text-sm" v-html="errorHtml"></div>
      <div class="bg-white rounded-lg border border-gray-200 overflow-hidden">
        <table class="w-full text-sm">
          <thead class="bg-gray-50 border-b border-gray-200"><tr>
            <th class="text-left px-5 py-3 text-gray-600 font-semibold">ID</th>
            <th class="text-left px-5 py-3 text-gray-600 font-semibold">名称</th>
            <th class="text-left px-5 py-3 text-gray-600 font-semibold">種別</th>
            <th class="text-left px-5 py-3 text-gray-600 font-semibold">設置場所</th>
            <th class="text-left px-5 py-3 text-gray-600 font-semibold">ステータス</th>
            <th class="text-left px-5 py-3 text-gray-600 font-semibold">IP</th>
            <th class="text-left px-5 py-3 text-gray-600 font-semibold"></th>
          </tr></thead>
          <tbody class="divide-y divide-gray-100">
            <tr v-for="d in devices" :key="d.id" class="hover:bg-gray-50">
              <td class="px-5 py-3 text-gray-400 font-mono text-xs">{{d.id}}</td>
              <td class="px-5 py-3 font-medium text-gray-800">{{d.name}}</td>
              <td class="px-5 py-3 text-gray-500">{{d.type}}</td>
              <td class="px-5 py-3 text-gray-500">{{d.location}}</td>
              <td class="px-5 py-3"><span class="px-2 py-0.5 rounded-full text-xs font-medium" :class="d.status==='online'?'bg-green-100 text-green-700':d.status==='warning'?'bg-amber-100 text-amber-700':'bg-gray-100 text-gray-500'">{{d.status}}</span></td>
              <td class="px-5 py-3 text-gray-400 font-mono text-xs">{{d.ip_address}}</td>
              <td class="px-5 py-3"><router-link :to="'/device?id='+d.id" class="text-blue-500 text-xs hover:underline">詳細</router-link></td>
            </tr>
          </tbody>
        </table>
      </div>
    </main>
  </div>`,
  setup() {
    const search = ref(''), devices = ref([]), errorHtml = ref('')
    async function doSearch() {
      errorHtml.value = ''
      const q = search.value ? '{ devices(search: "'+search.value+'") { id name type location status ip_address firmware } }' : '{ devices { id name type location status ip_address firmware } }'
      const res = await fetch('/graphql', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({query:q}) })
      const json = await res.json()
      if(json.errors) { errorHtml.value = json.errors.map(e=>e.message).join('<br>'); devices.value=[] }
      else { devices.value = json.data?.devices || [] }
    }
    onMounted(doSearch)
    function logout() { localStorage.removeItem('user'); window.location.href='/' }
    return { search, devices, errorHtml, doSearch, logout }
  }
}

/* ══════════════════════════════
   DEVICE DETAIL - デバイス詳細（B: 手動巡回用）
   IDを入力して遷移 → ここにCritical脆弱性集中
   ══════════════════════════════ */
const DeviceDetailPage = {
  components: { AppHeader },
  template: `
  <div>
    <AppHeader current="" @logout="logout" />
    <main class="max-w-4xl mx-auto px-6 py-8">
      <h1 class="text-xl font-bold text-gray-900 mb-6">デバイス詳細</h1>

      <!-- デバイスID入力 -->
      <div class="bg-white rounded-lg border border-gray-200 p-5 mb-6">
        <p class="text-gray-500 text-sm mb-3">デバイスIDを入力して詳細情報を表示</p>
        <div class="flex gap-3">
          <input v-model="deviceId" @keyup.enter="fetchDevice" type="text" placeholder="デバイスID（例: 1）" class="flex-1 px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-400">
          <button @click="fetchDevice" class="px-5 py-2 bg-blue-600 text-white rounded-lg text-sm font-medium hover:bg-blue-700">検索</button>
        </div>
      </div>

      <div v-if="errorHtml" class="mb-6 p-4 bg-red-50 border border-red-200 rounded-lg text-red-600 text-sm" v-html="errorHtml"></div>

      <!-- デバイス情報 -->
      <div v-if="device" class="space-y-6">
        <div class="bg-white rounded-lg border border-gray-200 overflow-hidden">
          <div class="px-5 py-4 border-b border-gray-100 bg-blue-50">
            <h2 class="font-bold text-blue-800">{{device.name}}</h2>
            <span class="px-2 py-0.5 rounded-full text-xs font-medium" :class="device.status==='online'?'bg-green-100 text-green-700':device.status==='warning'?'bg-amber-100 text-amber-700':'bg-gray-100 text-gray-500'">{{device.status}}</span>
          </div>
          <table class="w-full text-sm">
            <tr class="border-b border-gray-50"><th class="text-left px-5 py-3 bg-gray-50 text-gray-600 w-36">ID</th><td class="px-5 py-3">{{device.id}}</td></tr>
            <tr class="border-b border-gray-50"><th class="text-left px-5 py-3 bg-gray-50 text-gray-600">種別</th><td class="px-5 py-3">{{device.type}}</td></tr>
            <tr class="border-b border-gray-50"><th class="text-left px-5 py-3 bg-gray-50 text-gray-600">設置場所</th><td class="px-5 py-3">{{device.location}}</td></tr>
            <tr class="border-b border-gray-50"><th class="text-left px-5 py-3 bg-gray-50 text-gray-600">IPアドレス</th><td class="px-5 py-3 font-mono">{{device.ip_address}}</td></tr>
            <tr><th class="text-left px-5 py-3 bg-gray-50 text-gray-600">ファームウェア</th><td class="px-5 py-3">{{device.firmware}}</td></tr>
          </table>
        </div>

        <!-- ネットワーク診断 -->
        <div class="bg-white rounded-lg border border-gray-200 p-5">
          <h3 class="font-semibold text-gray-800 mb-3">ネットワーク診断</h3>
          <div class="flex gap-3 mb-3">
            <input v-model="pingHost" type="text" :placeholder="device.ip_address" class="flex-1 px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-400">
            <button @click="doPing" class="px-5 py-2 bg-gray-700 text-white rounded-lg text-sm font-medium hover:bg-gray-800">Ping実行</button>
          </div>
          <pre v-if="pingResult" class="bg-gray-900 text-green-400 p-4 rounded-lg text-xs overflow-auto max-h-40 font-mono">{{pingResult}}</pre>
        </div>

        <!-- FW更新チェック -->
        <div class="bg-white rounded-lg border border-gray-200 p-5">
          <h3 class="font-semibold text-gray-800 mb-3">ファームウェア更新チェック</h3>
          <div class="flex gap-3 mb-3">
            <input v-model="fetchUrl" type="text" placeholder="https://vendor.example.com/firmware/latest.json" class="flex-1 px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-400">
            <button @click="doFetch" class="px-5 py-2 bg-gray-700 text-white rounded-lg text-sm font-medium hover:bg-gray-800">取得</button>
          </div>
          <pre v-if="fetchResult" class="bg-gray-50 border border-gray-200 p-4 rounded-lg text-xs overflow-auto max-h-40 font-mono">{{fetchResult}}</pre>
        </div>
      </div>

      <div v-if="!device && !errorHtml" class="text-center py-16 text-gray-400">
        <p class="text-3xl mb-3">🔍</p>
        <p>デバイスIDを入力して検索してください</p>
      </div>
    </main>
  </div>`,
  setup() {
    const route = VueRouter.useRoute()
    const deviceId = ref(''), device = ref(null), errorHtml = ref('')
    const pingHost = ref(''), pingResult = ref(''), fetchUrl = ref(''), fetchResult = ref('')

    async function fetchDevice() {
      if(!deviceId.value) return
      errorHtml.value=''; device.value=null; pingResult.value=''; fetchResult.value=''
      const res = await fetch('/api/device/'+deviceId.value)
      const json = await res.json()
      if(json.error) { errorHtml.value=json.error } else { device.value=json; pingHost.value=json.ip_address||'' }
    }
    async function doPing() {
      const res = await fetch('/graphql', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({query:'{ ping(host: "'+pingHost.value+'") { output } }'}) })
      const json = await res.json(); pingResult.value = json.data?.ping?.output || 'Error'
    }
    async function doFetch() {
      if(!fetchUrl.value) return
      const res = await fetch('/graphql', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({query:'{ fetch_url(url: "'+fetchUrl.value+'") { status body } }'}) })
      const json = await res.json(); const r=json.data?.fetch_url; fetchResult.value = r ? 'Status: '+r.status+'\n\n'+r.body : 'Error'
    }
    onMounted(() => { if(route.query.id) { deviceId.value=route.query.id; fetchDevice() } })
    function logout() { localStorage.removeItem('user'); window.location.href='/' }
    return { deviceId, device, errorHtml, pingHost, pingResult, fetchUrl, fetchResult, fetchDevice, doPing, doFetch, logout }
  }
}

/* ══════════════════════════════
   CONTACT - お問い合わせ
   ══════════════════════════════ */
const ContactPage = {
  components: { AppHeader },
  template: `
  <div>
    <AppHeader current="contact" @logout="logout" />
    <main class="max-w-3xl mx-auto px-6 py-8">
      <h1 class="text-xl font-bold text-gray-900 mb-6">お問い合わせ</h1>
      <div class="bg-white rounded-lg border border-gray-200 p-6">
        <form @submit.prevent="submitInquiry">
          <div class="grid grid-cols-2 gap-4 mb-4">
            <div><label class="block text-sm text-gray-600 mb-1">お名前</label><input v-model="name" type="text" class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-400"></div>
            <div><label class="block text-sm text-gray-600 mb-1">会社名</label><input v-model="company" type="text" class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-400"></div>
          </div>
          <div class="mb-4"><label class="block text-sm text-gray-600 mb-1">メールアドレス</label><input v-model="email" type="email" class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-400"></div>
          <div class="mb-5"><label class="block text-sm text-gray-600 mb-1">お問い合わせ内容</label><textarea v-model="message" rows="4" class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-400 resize-none"></textarea></div>
          <div v-if="success" class="mb-4 p-3 rounded-lg bg-green-50 border border-green-200 text-green-700 text-sm">お問い合わせを受け付けました</div>
          <button type="submit" class="w-full py-2.5 bg-blue-600 text-white rounded-lg text-sm font-medium hover:bg-blue-700 transition">送信する</button>
        </form>
      </div>
    </main>
  </div>`,
  setup() {
    const name=ref(''), company=ref(''), email=ref(''), message=ref(''), success=ref(false)
    async function submitInquiry() {
      await fetch('/graphql', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({query:'mutation { submitInquiry(name: "'+name.value+'", email: "'+email.value+'", company: "'+company.value+'", message: "'+message.value+'") { name } }'}) })
      success.value = true
    }
    function logout() { localStorage.removeItem('user'); window.location.href='/' }
    return { name, company, email, message, success, submitInquiry, logout }
  }
}

/* ── Router ── */
const routes = [
  { path: '/', component: LoginPage },
  { path: '/dashboard', component: DashboardPage },
  { path: '/devices', component: DevicesPage },
  { path: '/device', component: DeviceDetailPage },
  { path: '/contact', component: ContactPage },
]
const router = createRouter({ history: createWebHistory('/'), routes })
createApp({ template:'<router-view />' }).use(router).mount('#app')
</script>
</body>
</html>
