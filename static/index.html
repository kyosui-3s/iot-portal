<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QuoteFlow - 営業見積管理 SaaS</title>
  <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
  <script src="https://unpkg.com/vue-router@4/dist/vue-router.global.prod.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-slate-100">
<div id="app"></div>

<footer style="border-top:1px solid #e5e7eb;padding:16px 20px;text-align:center;font-size:12px;color:#9ca3af;margin-top:40px">
  <p>&copy; 2026 QuoteFlow, Inc. |
    <a href="/dashboard" style="color:#6b7280;margin:0 4px">ダッシュボード</a> |
    <a href="/customers" style="color:#6b7280;margin:0 4px">顧客</a> |
    <a href="/customers/search" style="color:#6b7280;margin:0 4px">顧客検索（旧）</a> |
    <a href="/customers/lookup" style="color:#6b7280;margin:0 4px">顧客ID検索</a> |
    <a href="/quotes" style="color:#6b7280;margin:0 4px">見積</a> |
    <a href="/tools/import" style="color:#6b7280;margin:0 4px">URL取込</a> |
    <a href="/admin/export" style="color:#6b7280;margin:0 4px">管理エクスポート</a>
  </p>
</footer>

<script>
const { createApp, ref, reactive, onMounted, watch, computed } = Vue
const { createRouter, createWebHistory, useRoute, useRouter } = VueRouter

const fmt = n => new Intl.NumberFormat('ja-JP').format(n||0)
const STATUS_LABEL = { draft:'下書き', sent:'送付済', accepted:'受注', rejected:'失注' }
const STATUS_COLOR = { draft:'bg-gray-400', sent:'bg-blue-500', accepted:'bg-emerald-500', rejected:'bg-red-500' }

/* ─────────── 共通ヘッダー ─────────── */
const AppHeader = {
  props:['current'],
  template: `
  <header class="bg-gradient-to-r from-indigo-800 to-indigo-600 sticky top-0 z-50 shadow-lg">
    <div class="max-w-6xl mx-auto px-6 h-14 flex items-center justify-between">
      <div class="flex items-center gap-8">
        <router-link to="/dashboard" class="font-bold text-lg text-white tracking-wide flex items-center gap-2">📋 QuoteFlow</router-link>
        <nav class="flex gap-1">
          <router-link to="/dashboard" class="px-3 py-1.5 rounded text-sm transition" :class="current==='dashboard'?'bg-white/20 text-white font-semibold':'text-indigo-200 hover:bg-white/10 hover:text-white'">ダッシュボード</router-link>
          <router-link to="/customers" class="px-3 py-1.5 rounded text-sm transition" :class="current==='customers'?'bg-white/20 text-white font-semibold':'text-indigo-200 hover:bg-white/10 hover:text-white'">顧客</router-link>
          <router-link to="/quotes" class="px-3 py-1.5 rounded text-sm transition" :class="current==='quotes'?'bg-white/20 text-white font-semibold':'text-indigo-200 hover:bg-white/10 hover:text-white'">見積</router-link>
          <router-link to="/quotes/new" class="px-3 py-1.5 rounded text-sm transition" :class="current==='new'?'bg-white/20 text-white font-semibold':'text-indigo-200 hover:bg-white/10 hover:text-white'">+ 新規見積</router-link>
        </nav>
      </div>
      <button @click="$emit('logout')" class="text-indigo-200 hover:text-white text-sm">ログアウト</button>
    </div>
  </header>`
}

/* ─────────── ログイン ─────────── */
const LoginPage = {
  template:`
  <div class="min-h-screen flex items-center justify-center bg-gradient-to-br from-slate-900 via-indigo-900 to-slate-900">
    <div class="w-full max-w-sm mx-4">
      <div class="text-center mb-6">
        <div class="inline-flex items-center justify-center w-16 h-16 rounded-2xl bg-indigo-500 shadow-lg shadow-indigo-500/30 mb-3"><span class="text-3xl">📋</span></div>
        <h1 class="text-2xl font-bold text-white">QuoteFlow</h1>
        <p class="text-indigo-300 text-sm mt-1">営業見積管理 SaaS</p>
      </div>
      <div class="bg-white rounded-2xl p-8 shadow-2xl">
        <h2 class="text-lg font-bold text-gray-800 mb-5">ログイン</h2>
        <form @submit.prevent="doLogin">
          <div class="mb-4">
            <label class="block text-sm font-medium text-gray-600 mb-1.5">メールアドレス</label>
            <input v-model="email" type="text" placeholder="tanaka@quoteflow.com" class="w-full px-4 py-2.5 bg-gray-50 border-2 border-gray-200 rounded-lg text-sm focus:outline-none focus:border-indigo-500 focus:bg-white">
          </div>
          <div class="mb-5">
            <label class="block text-sm font-medium text-gray-600 mb-1.5">パスワード</label>
            <input v-model="password" type="password" placeholder="••••••••" class="w-full px-4 py-2.5 bg-gray-50 border-2 border-gray-200 rounded-lg text-sm focus:outline-none focus:border-indigo-500 focus:bg-white">
          </div>
          <div v-if="error" class="mb-4 p-3 rounded-lg bg-red-50 border-2 border-red-200 text-red-600 text-sm" v-html="error"></div>
          <button type="submit" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 rounded-lg text-sm shadow-lg shadow-indigo-500/25">ログイン</button>
        </form>
      </div>
    </div>
  </div>`,
  setup(){
    const email=ref(''), password=ref(''), error=ref('')
    const router=useRouter()
    async function doLogin(){
      const res=await fetch('/api/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email:email.value,password:password.value})})
      const data=await res.json()
      if(data.success){localStorage.setItem('user',JSON.stringify(data.user));router.push('/dashboard')}
      else{error.value=data.error}
    }
    return {email,password,error,doLogin}
  }
}

/* ─────────── ダッシュボード ─────────── */
const DashboardPage = {
  components:{AppHeader},
  template:`
  <div>
    <AppHeader current="dashboard" @logout="logout"/>
    <div class="bg-gradient-to-r from-indigo-800 to-indigo-600 px-6 py-6">
      <div class="max-w-6xl mx-auto">
        <h1 class="text-xl font-bold text-white">ダッシュボード</h1>
        <p class="text-indigo-200 text-sm">{{user?.name||'ゲスト'}}さん、こんにちは</p>
      </div>
    </div>
    <main class="max-w-6xl mx-auto px-6 -mt-4">
      <div class="grid grid-cols-4 gap-4 mb-6">
        <div class="rounded-xl p-5 shadow-lg bg-gradient-to-br from-indigo-500 to-indigo-700 text-white">
          <p class="text-xs font-bold text-indigo-100 uppercase mb-2">作成済み見積</p>
          <p class="text-4xl font-black">{{stats.total}}</p>
        </div>
        <div class="rounded-xl p-5 shadow-lg bg-gradient-to-br from-blue-500 to-blue-700 text-white">
          <p class="text-xs font-bold uppercase mb-2">送付済</p>
          <p class="text-4xl font-black">{{stats.sent}}</p>
        </div>
        <div class="rounded-xl p-5 shadow-lg bg-gradient-to-br from-emerald-500 to-emerald-700 text-white">
          <p class="text-xs font-bold uppercase mb-2">受注</p>
          <p class="text-4xl font-black">{{stats.accepted}}</p>
        </div>
        <div class="rounded-xl p-5 shadow-lg bg-gradient-to-br from-amber-500 to-amber-700 text-white">
          <p class="text-xs font-bold uppercase mb-2">受注金額</p>
          <p class="text-2xl font-black">¥{{fmt(stats.acceptedTotal)}}</p>
        </div>
      </div>
      <div class="bg-white rounded-xl shadow-lg overflow-hidden border border-gray-200">
        <div class="px-5 py-3 bg-gray-50 border-b border-gray-200 flex justify-between items-center">
          <h3 class="text-sm font-bold text-gray-700">最近の見積</h3>
          <router-link to="/quotes" class="text-indigo-600 text-xs font-medium hover:underline">すべて →</router-link>
        </div>
        <table class="w-full text-sm">
          <thead><tr class="bg-gray-800 text-white">
            <th class="text-left px-4 py-2">チケット</th><th class="text-left px-4 py-2">顧客</th><th class="text-left px-4 py-2">タイトル</th><th class="text-right px-4 py-2">金額</th><th class="text-left px-4 py-2">状態</th><th></th>
          </tr></thead>
          <tbody>
            <tr v-for="q in recentQuotes" :key="q.id" class="border-b border-gray-100 hover:bg-indigo-50">
              <td class="px-4 py-2 font-mono text-indigo-700">{{q.ticket}}</td>
              <td class="px-4 py-2">{{q.customer_company}}</td>
              <td class="px-4 py-2">{{q.title}}</td>
              <td class="px-4 py-2 text-right font-mono">¥{{fmt(q.total)}}</td>
              <td class="px-4 py-2"><span class="px-2 py-1 rounded text-xs font-bold text-white" :class="STATUS_COLOR[q.status]">{{STATUS_LABEL[q.status]}}</span></td>
              <td class="px-4 py-2"><router-link :to="'/quotes/'+q.id" class="text-indigo-600 text-xs underline">詳細</router-link></td>
            </tr>
          </tbody>
        </table>
      </div>
    </main>
  </div>`,
  setup(){
    const user=ref(JSON.parse(localStorage.getItem('user')||'null'))
    const quotes=ref([])
    const stats=reactive({total:0, sent:0, accepted:0, acceptedTotal:0})
    const recentQuotes=computed(()=>quotes.value.slice(0,6))
    onMounted(async()=>{
      const res=await fetch('/api/quotes'); const j=await res.json()
      quotes.value=j.quotes||[]
      stats.total=quotes.value.length
      stats.sent=quotes.value.filter(q=>q.status==='sent').length
      stats.accepted=quotes.value.filter(q=>q.status==='accepted').length
      stats.acceptedTotal=quotes.value.filter(q=>q.status==='accepted').reduce((s,q)=>s+(q.total||0),0)
    })
    function logout(){localStorage.removeItem('user');window.location.href='/'}
    return {user,quotes,stats,recentQuotes,logout,fmt,STATUS_LABEL,STATUS_COLOR}
  }
}

/* ─────────── 顧客一覧 ─────────── */
const CustomersPage = {
  components:{AppHeader},
  template:`
  <div>
    <AppHeader current="customers" @logout="logout"/>
    <div class="bg-gradient-to-r from-emerald-700 to-teal-600 px-6 py-6">
      <div class="max-w-6xl mx-auto">
        <h1 class="text-xl font-bold text-white">顧客一覧</h1>
        <p class="text-emerald-200 text-sm">取引先 顧客マスタ</p>
      </div>
    </div>
    <main class="max-w-6xl mx-auto px-6 -mt-4">
      <div class="bg-white rounded-xl shadow-lg overflow-hidden border border-gray-200">
        <div class="px-5 py-4 bg-emerald-50 border-b-2 border-emerald-200 flex items-center gap-3">
          <input v-model="search" @keyup.enter="doSearch" type="text" placeholder="会社名 / 担当者名" class="flex-1 px-4 py-2.5 bg-white border-2 border-emerald-300 rounded-lg text-sm">
          <button @click="doSearch" class="px-5 py-2.5 bg-emerald-600 text-white rounded-lg text-sm font-bold">検索</button>
        </div>
        <table class="w-full text-sm">
          <thead><tr class="bg-gray-800 text-white">
            <th class="text-left px-4 py-3">ID</th><th class="text-left px-4 py-3">会社名</th><th class="text-left px-4 py-3">業種</th><th class="text-left px-4 py-3">担当者</th><th class="text-left px-4 py-3">メール</th><th class="text-right px-4 py-3">売上規模</th><th></th>
          </tr></thead>
          <tbody>
            <tr v-for="c in customers" :key="c.id" class="border-b border-gray-100 hover:bg-emerald-50">
              <td class="px-4 py-3 font-mono">{{c.id}}</td>
              <td class="px-4 py-3 font-bold">{{c.company}}</td>
              <td class="px-4 py-3">{{c.industry}}</td>
              <td class="px-4 py-3">{{c.name}}</td>
              <td class="px-4 py-3 text-gray-600">{{c.email}}</td>
              <td class="px-4 py-3 text-right font-mono">¥{{fmt(c.annual_revenue)}}</td>
              <td class="px-4 py-3"><router-link :to="'/customers/'+c.id" class="text-emerald-700 text-xs underline">詳細 →</router-link></td>
            </tr>
          </tbody>
        </table>
      </div>
    </main>
  </div>`,
  setup(){
    const search=ref(''), customers=ref([])
    async function doSearch(){
      const url='/api/customers'+(search.value?'?q='+encodeURIComponent(search.value):'')
      const res=await fetch(url); const j=await res.json()
      customers.value=j.customers||[]
    }
    onMounted(doSearch)
    function logout(){localStorage.removeItem('user');window.location.href='/'}
    return {search,customers,doSearch,logout,fmt}
  }
}

/* ─────────── 顧客詳細 (IDOR) ─────────── */
const CustomerDetailPage = {
  components:{AppHeader},
  template:`
  <div>
    <AppHeader current="customers" @logout="logout"/>
    <div class="bg-gradient-to-r from-emerald-700 to-teal-600 px-6 py-6">
      <div class="max-w-5xl mx-auto">
        <div class="text-sm text-emerald-200 mb-1">
          <router-link to="/customers" class="hover:text-white">顧客一覧</router-link>
          <span class="mx-2">/</span><span class="text-white">{{customer?.company || '読込中'}}</span>
        </div>
        <h1 class="text-xl font-bold text-white">{{customer?.company || '...'}}</h1>
      </div>
    </div>
    <main class="max-w-5xl mx-auto px-6 -mt-4" v-if="customer">
      <div class="bg-white rounded-xl shadow-lg p-6 border border-gray-200 mb-5">
        <h3 class="font-bold text-gray-800 mb-3">顧客基本情報</h3>
        <table class="w-full text-sm">
          <tr class="border-b"><th class="text-left py-2 text-gray-600 w-32">ID</th><td class="py-2 font-mono">{{customer.id}}</td></tr>
          <tr class="border-b"><th class="text-left py-2 text-gray-600">会社名</th><td class="py-2 font-bold">{{customer.company}}</td></tr>
          <tr class="border-b"><th class="text-left py-2 text-gray-600">業種</th><td class="py-2">{{customer.industry}}</td></tr>
          <tr class="border-b"><th class="text-left py-2 text-gray-600">主担当</th><td class="py-2">{{customer.name}}</td></tr>
          <tr class="border-b"><th class="text-left py-2 text-gray-600">メール</th><td class="py-2">{{customer.email}}</td></tr>
          <tr class="border-b"><th class="text-left py-2 text-gray-600">電話</th><td class="py-2">{{customer.phone}}</td></tr>
          <tr class="border-b"><th class="text-left py-2 text-gray-600">住所</th><td class="py-2">{{customer.address}}</td></tr>
          <tr><th class="text-left py-2 text-gray-600">売上規模</th><td class="py-2 font-mono">¥{{fmt(customer.annual_revenue)}}</td></tr>
        </table>
      </div>
      <div class="bg-white rounded-xl shadow-lg p-6 border border-gray-200">
        <h3 class="font-bold text-gray-800 mb-3">担当者一覧 ({{contacts.length}})</h3>
        <table class="w-full text-sm">
          <thead><tr class="bg-gray-100">
            <th class="text-left px-3 py-2">氏名</th><th class="text-left px-3 py-2">役職</th><th class="text-left px-3 py-2">メール</th><th class="text-left px-3 py-2">電話</th>
          </tr></thead>
          <tbody>
            <tr v-for="ct in contacts" :key="ct.id" class="border-b">
              <td class="px-3 py-2">{{ct.name}}</td><td class="px-3 py-2">{{ct.role}}</td><td class="px-3 py-2">{{ct.email}}</td><td class="px-3 py-2">{{ct.phone}}</td>
            </tr>
          </tbody>
        </table>
      </div>
    </main>
    <main v-else-if="error" class="max-w-3xl mx-auto px-6 mt-8">
      <div class="bg-red-50 border-2 border-red-200 p-4 rounded text-red-700" v-html="error"></div>
    </main>
  </div>`,
  setup(){
    const route=useRoute()
    const customer=ref(null), contacts=ref([]), error=ref('')
    async function load(){
      error.value=''; customer.value=null; contacts.value=[]
      const res=await fetch('/api/customers/'+route.params.id)
      const j=await res.json()
      if(j.error){error.value=j.error+(j.sql?'<br><code>'+j.sql+'</code>':'')}
      else{customer.value=j.customer; contacts.value=j.contacts||[]}
    }
    onMounted(load); watch(()=>route.params.id, load)
    function logout(){localStorage.removeItem('user');window.location.href='/'}
    return {customer,contacts,error,logout,fmt}
  }
}

/* ─────────── 見積一覧 ─────────── */
const QuotesPage = {
  components:{AppHeader},
  template:`
  <div>
    <AppHeader current="quotes" @logout="logout"/>
    <div class="bg-gradient-to-r from-violet-700 to-purple-600 px-6 py-6">
      <div class="max-w-6xl mx-auto flex justify-between items-center">
        <div><h1 class="text-xl font-bold text-white">見積一覧</h1><p class="text-violet-200 text-sm">作成済みの見積</p></div>
        <router-link to="/quotes/new" class="px-4 py-2 bg-white text-violet-700 rounded-lg font-bold text-sm">+ 新規作成</router-link>
      </div>
    </div>
    <main class="max-w-6xl mx-auto px-6 -mt-4">
      <div class="bg-white rounded-xl shadow-lg overflow-hidden border border-gray-200">
        <table class="w-full text-sm">
          <thead><tr class="bg-gray-800 text-white">
            <th class="text-left px-4 py-3">チケット</th><th class="text-left px-4 py-3">顧客</th><th class="text-left px-4 py-3">タイトル</th><th class="text-right px-4 py-3">小計</th><th class="text-right px-4 py-3">消費税</th><th class="text-right px-4 py-3">合計</th><th class="text-left px-4 py-3">状態</th><th class="text-left px-4 py-3">期日</th><th></th>
          </tr></thead>
          <tbody>
            <tr v-for="q in quotes" :key="q.id" class="border-b hover:bg-violet-50">
              <td class="px-4 py-3 font-mono text-violet-700 font-bold">{{q.ticket}}</td>
              <td class="px-4 py-3">{{q.customer_company}}</td>
              <td class="px-4 py-3">{{q.title}}</td>
              <td class="px-4 py-3 text-right font-mono">¥{{fmt(q.total)}}</td>
              <td class="px-4 py-3 text-right font-mono text-gray-500">¥{{fmt(q.tax)}}</td>
              <td class="px-4 py-3 text-right font-mono font-bold">¥{{fmt(q.total+q.tax)}}</td>
              <td class="px-4 py-3"><span class="px-2 py-1 rounded text-xs font-bold text-white" :class="STATUS_COLOR[q.status]">{{STATUS_LABEL[q.status]}}</span></td>
              <td class="px-4 py-3 text-xs text-gray-500">{{q.valid_until}}</td>
              <td class="px-4 py-3 whitespace-nowrap">
                <router-link :to="'/quotes/'+q.id" class="text-violet-700 text-xs underline mr-3">詳細</router-link>
                <button @click="deleteQuote(q)" class="text-red-600 text-xs underline hover:text-red-800">削除</button>
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </main>
  </div>`,
  setup(){
    const quotes=ref([])
    async function load(){const res=await fetch('/api/quotes'); const j=await res.json(); quotes.value=j.quotes||[]}
    async function deleteQuote(q){
      if(!confirm(`見積 ${q.ticket}（${q.customer_company} / ${q.title}）を削除しますか？\nこの操作は取り消せません。`)) return
      const res=await fetch('/api/quotes/'+q.id, {method:'DELETE'})
      const j=await res.json()
      if(j.success){ await load() } else { alert('削除失敗: '+(j.error||'unknown')) }
    }
    onMounted(load)
    function logout(){localStorage.removeItem('user');window.location.href='/'}
    return {quotes,deleteQuote,logout,fmt,STATUS_LABEL,STATUS_COLOR}
  }
}

/* ─────────── 見積詳細 + PDF (Path Traversal) ─────────── */
const QuoteDetailPage = {
  components:{AppHeader},
  template:`
  <div>
    <AppHeader current="quotes" @logout="logout"/>
    <div class="bg-gradient-to-r from-violet-700 to-purple-600 px-6 py-6">
      <div class="max-w-5xl mx-auto">
        <div class="text-sm text-violet-200 mb-1">
          <router-link to="/quotes" class="hover:text-white">見積一覧</router-link>
          <span class="mx-2">/</span><span class="text-white">{{quote?.ticket||'読込中'}}</span>
        </div>
        <h1 class="text-xl font-bold text-white">{{quote?.title||'...'}}</h1>
      </div>
    </div>
    <main class="max-w-5xl mx-auto px-6 -mt-4" v-if="quote">
      <div class="bg-white rounded-xl shadow-lg p-6 border border-gray-200 mb-5">
        <div class="flex justify-between items-start mb-4">
          <div>
            <p class="text-xs text-gray-500">チケット番号</p>
            <p class="text-2xl font-bold text-violet-700 font-mono">{{quote.ticket}}</p>
          </div>
          <span class="px-3 py-1 rounded text-sm font-bold text-white" :class="STATUS_COLOR[quote.status]">{{STATUS_LABEL[quote.status]}}</span>
        </div>
        <table class="w-full text-sm">
          <tr class="border-b"><th class="text-left py-2 text-gray-600 w-32">顧客</th><td class="py-2 font-bold">{{quote.customer_company}}</td></tr>
          <tr class="border-b"><th class="text-left py-2 text-gray-600">担当</th><td class="py-2">{{quote.customer_name}}</td></tr>
          <tr class="border-b"><th class="text-left py-2 text-gray-600">タイトル</th><td class="py-2">{{quote.title}}</td></tr>
          <tr class="border-b"><th class="text-left py-2 text-gray-600">小計</th><td class="py-2 font-mono">¥{{fmt(quote.total)}}</td></tr>
          <tr class="border-b"><th class="text-left py-2 text-gray-600">消費税</th><td class="py-2 font-mono">¥{{fmt(quote.tax)}}</td></tr>
          <tr class="border-b"><th class="text-left py-2 text-gray-600">合計</th><td class="py-2 font-mono font-bold text-lg">¥{{fmt(quote.total+quote.tax)}}</td></tr>
          <tr class="border-b"><th class="text-left py-2 text-gray-600">有効期限</th><td class="py-2">{{quote.valid_until}}</td></tr>
          <tr><th class="text-left py-2 text-gray-600 align-top">備考</th><td class="py-2 whitespace-pre-wrap">{{quote.notes}}</td></tr>
        </table>
        <div class="mt-5 flex gap-3">
          <a :href="'/quotes/'+quote.id+'/pdf?file=quote_'+quote.ticket+'.pdf'" target="_blank" class="px-4 py-2 bg-violet-600 text-white rounded-lg text-sm font-bold">📄 PDFダウンロード</a>
          <button @click="deleteQuote" class="ml-auto px-4 py-2 bg-red-600 text-white rounded-lg text-sm font-bold hover:bg-red-700">🗑 削除</button>
        </div>
      </div>
      <div class="bg-white rounded-xl shadow-lg p-6 border border-gray-200">
        <h3 class="font-bold text-gray-800 mb-3">明細 ({{items.length}})</h3>
        <table class="w-full text-sm">
          <thead><tr class="bg-gray-100">
            <th class="text-left px-3 py-2">品目</th><th class="text-left px-3 py-2">摘要</th><th class="text-right px-3 py-2">数量</th><th class="text-right px-3 py-2">単価</th><th class="text-right px-3 py-2">小計</th>
          </tr></thead>
          <tbody>
            <tr v-for="it in items" :key="it.id" class="border-b">
              <td class="px-3 py-2 font-bold">{{it.product_name}}</td>
              <td class="px-3 py-2 text-gray-600">{{it.description}}</td>
              <td class="px-3 py-2 text-right font-mono">{{it.qty}}</td>
              <td class="px-3 py-2 text-right font-mono">¥{{fmt(it.unit_price)}}</td>
              <td class="px-3 py-2 text-right font-mono font-bold">¥{{fmt(it.subtotal)}}</td>
            </tr>
          </tbody>
        </table>
      </div>
    </main>
    <main v-else-if="error" class="max-w-3xl mx-auto px-6 mt-8">
      <div class="bg-red-50 border-2 border-red-200 p-4 rounded text-red-700" v-html="error"></div>
    </main>
  </div>`,
  setup(){
    const route=useRoute()
    const quote=ref(null), items=ref([]), error=ref('')
    async function load(){
      error.value=''; quote.value=null
      const res=await fetch('/api/quotes/'+route.params.id)
      const j=await res.json()
      if(j.error){error.value=j.error+(j.sql?'<br><code>'+j.sql+'</code>':'')}
      else{quote.value=j.quote; items.value=j.items||[]}
    }
    onMounted(load); watch(()=>route.params.id, load)
    const router=useRouter()
    async function deleteQuote(){
      if(!quote.value) return
      if(!confirm(`見積 ${quote.value.ticket}（${quote.value.customer_company} / ${quote.value.title}）を削除しますか？\nこの操作は取り消せません。`)) return
      const res=await fetch('/api/quotes/'+quote.value.id, {method:'DELETE'})
      const j=await res.json()
      if(j.success){ router.push('/quotes') } else { alert('削除失敗: '+(j.error||'unknown')) }
    }
    function logout(){localStorage.removeItem('user');window.location.href='/'}
    return {quote,items,error,deleteQuote,logout,fmt,STATUS_LABEL,STATUS_COLOR}
  }
}

/* ─────────── 新規見積 (フォーム) ─────────── */
const QuoteNewPage = {
  components:{AppHeader},
  template:`
  <div>
    <AppHeader current="new" @logout="logout"/>
    <div class="bg-gradient-to-r from-violet-700 to-purple-600 px-6 py-6">
      <div class="max-w-3xl mx-auto"><h1 class="text-xl font-bold text-white">新規見積作成</h1></div>
    </div>
    <main class="max-w-3xl mx-auto px-6 -mt-4">
      <div class="bg-white rounded-xl shadow-lg p-8 border border-gray-200">
        <div class="mb-5 px-3 py-2 bg-amber-50 border-l-4 border-amber-400 text-xs text-amber-700">
          ※ 全項目入力後「確認画面へ進む」で内容確認します。
        </div>
        <form @submit.prevent="goConfirm">
          <div class="mb-4">
            <label class="block text-sm font-bold text-gray-700 mb-1">顧客 <span class="text-red-500">*</span></label>
            <select v-model="customer_id" required class="w-full px-4 py-2.5 bg-gray-50 border-2 border-gray-200 rounded-lg text-sm">
              <option value="">選択してください</option>
              <option v-for="c in customers" :key="c.id" :value="c.id">{{c.company}}</option>
            </select>
          </div>
          <div class="mb-4">
            <label class="block text-sm font-bold text-gray-700 mb-1">タイトル <span class="text-red-500">*</span></label>
            <input v-model="title" type="text" required placeholder="例: サーバ更改一式" class="w-full px-4 py-2.5 bg-gray-50 border-2 border-gray-200 rounded-lg text-sm">
          </div>
          <div class="grid grid-cols-2 gap-4 mb-4">
            <div>
              <label class="block text-sm font-bold text-gray-700 mb-1">小計 (税抜) <span class="text-red-500">*</span></label>
              <input v-model="total" type="number" required placeholder="1000000" class="w-full px-4 py-2.5 bg-gray-50 border-2 border-gray-200 rounded-lg text-sm">
            </div>
            <div>
              <label class="block text-sm font-bold text-gray-700 mb-1">有効期限</label>
              <input v-model="valid_until" type="date" class="w-full px-4 py-2.5 bg-gray-50 border-2 border-gray-200 rounded-lg text-sm">
            </div>
          </div>
          <div class="mb-6">
            <label class="block text-sm font-bold text-gray-700 mb-1">備考</label>
            <textarea v-model="notes" rows="4" class="w-full px-4 py-2.5 bg-gray-50 border-2 border-gray-200 rounded-lg text-sm resize-none"></textarea>
          </div>
          <div v-if="error" class="mb-4 p-3 rounded-lg bg-red-50 border-2 border-red-200 text-red-600 text-sm">{{error}}</div>
          <button type="submit" class="w-full py-3 bg-violet-600 text-white rounded-lg font-bold">確認画面へ進む →</button>
        </form>
      </div>
    </main>
  </div>`,
  setup(){
    const router=useRouter()
    const customers=ref([])
    const customer_id=ref(''), title=ref(''), total=ref(''), valid_until=ref('2026-12-31'), notes=ref(''), error=ref('')
    onMounted(async()=>{const r=await fetch('/api/customers'); const j=await r.json(); customers.value=j.customers||[]})
    async function goConfirm(){
      error.value=''
      const payload={customer_id:customer_id.value, title:title.value, total:total.value, valid_until:valid_until.value, notes:notes.value}
      const res=await fetch('/api/quotes/confirm',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)})
      if(!res.ok){const j=await res.json(); error.value=j.error||'入力エラー'; return}
      sessionStorage.setItem('quote_draft', JSON.stringify({...payload, customer_company:(customers.value.find(c=>c.id==customer_id.value)||{}).company}))
      router.push('/quotes/confirm')
    }
    function logout(){localStorage.removeItem('user');window.location.href='/'}
    return {customers,customer_id,title,total,valid_until,notes,error,goConfirm,logout}
  }
}

/* ─────────── 見積確認 (フォームゲート) ─────────── */
const QuoteConfirmPage = {
  components:{AppHeader},
  template:`
  <div>
    <AppHeader current="new" @logout="logout"/>
    <div class="bg-gradient-to-r from-violet-700 to-purple-600 px-6 py-6">
      <div class="max-w-3xl mx-auto">
        <div class="text-sm text-violet-200 mb-1">
          <router-link to="/quotes/new" class="hover:text-white">新規作成</router-link>
          <span class="mx-2">/</span><span class="text-white">確認</span>
        </div>
        <h1 class="text-xl font-bold text-white">入力内容確認</h1>
      </div>
    </div>
    <main class="max-w-3xl mx-auto px-6 -mt-4">
      <div v-if="draft" class="bg-white rounded-xl shadow-lg p-8 border border-gray-200">
        <p class="text-sm text-gray-600 mb-4">以下の内容で見積を作成します。</p>
        <table class="w-full mb-6">
          <tr class="border-b"><th class="text-left py-3 text-violet-700 w-32">顧客</th><td class="py-3" v-html="draft.customer_company"></td></tr>
          <tr class="border-b"><th class="text-left py-3 text-violet-700">タイトル</th><td class="py-3" v-html="draft.title"></td></tr>
          <tr class="border-b"><th class="text-left py-3 text-violet-700">小計</th><td class="py-3 font-mono">¥{{fmt(parseInt(draft.total||0))}}</td></tr>
          <tr class="border-b"><th class="text-left py-3 text-violet-700">消費税(10%)</th><td class="py-3 font-mono">¥{{fmt(Math.floor(parseInt(draft.total||0)*0.1))}}</td></tr>
          <tr class="border-b"><th class="text-left py-3 text-violet-700">合計</th><td class="py-3 font-mono font-bold">¥{{fmt(Math.floor(parseInt(draft.total||0)*1.1))}}</td></tr>
          <tr class="border-b"><th class="text-left py-3 text-violet-700">有効期限</th><td class="py-3">{{draft.valid_until}}</td></tr>
          <tr><th class="text-left py-3 text-violet-700 align-top">備考</th><td class="py-3 whitespace-pre-wrap" v-html="draft.notes"></td></tr>
        </table>
        <div v-if="error" class="mb-4 p-3 rounded-lg bg-red-50 border-2 border-red-200 text-red-600 text-sm">{{error}}</div>
        <div class="flex gap-3">
          <router-link to="/quotes/new" class="flex-1 py-3 bg-gray-200 text-gray-700 rounded-lg font-bold text-sm text-center">← 戻って修正</router-link>
          <button @click="submit" class="flex-1 py-3 bg-violet-600 text-white rounded-lg font-bold">作成する</button>
        </div>
      </div>
      <div v-else class="bg-white rounded-xl shadow-lg p-8 text-center">
        <p class="text-5xl mb-4">⚠️</p>
        <p class="text-gray-600 mb-4">入力データがありません。フォームから入力してください。</p>
        <router-link to="/quotes/new" class="inline-block px-6 py-2.5 bg-violet-600 text-white rounded-lg font-bold">新規作成へ</router-link>
      </div>
    </main>
  </div>`,
  setup(){
    const router=useRouter()
    const draft=ref(null), error=ref('')
    onMounted(()=>{
      const raw=sessionStorage.getItem('quote_draft')
      if(raw){try{draft.value=JSON.parse(raw)}catch(e){}}
    })
    async function submit(){
      error.value=''
      const res=await fetch('/api/quotes/submit',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(draft.value)})
      const j=await res.json()
      if(!res.ok||!j.success){error.value=j.error||'送信失敗'; return}
      sessionStorage.removeItem('quote_draft')
      router.push('/quotes/complete?ticket='+j.ticket)
    }
    function logout(){localStorage.removeItem('user');window.location.href='/'}
    return {draft,error,submit,logout,fmt}
  }
}

/* ─────────── 見積完了 (連番チケット IDOR) ─────────── */
const QuoteCompletePage = {
  components:{AppHeader},
  template:`
  <div>
    <AppHeader current="quotes" @logout="logout"/>
    <div class="bg-gradient-to-r from-emerald-600 to-teal-500 px-6 py-6">
      <div class="max-w-3xl mx-auto"><h1 class="text-xl font-bold text-white">作成完了</h1></div>
    </div>
    <main class="max-w-3xl mx-auto px-6 -mt-4" v-if="quote">
      <div class="bg-white rounded-xl shadow-lg p-8 border border-emerald-100">
        <div class="text-center mb-6">
          <p class="text-5xl mb-3">✅</p>
          <h2 class="text-xl font-bold text-emerald-700 mb-2">見積を作成しました</h2>
          <p class="text-sm text-gray-500">チケット番号: <code class="bg-emerald-50 px-2 py-0.5 rounded font-mono font-bold text-emerald-700">{{quote.ticket}}</code></p>
        </div>
        <table class="w-full text-sm">
          <tr class="border-b"><th class="text-left py-2 text-gray-600 w-32">顧客</th><td class="py-2 font-bold">{{quote.customer_company}}</td></tr>
          <tr class="border-b"><th class="text-left py-2 text-gray-600">タイトル</th><td class="py-2">{{quote.title}}</td></tr>
          <tr class="border-b"><th class="text-left py-2 text-gray-600">合計</th><td class="py-2 font-mono font-bold">¥{{fmt(quote.total+quote.tax)}}</td></tr>
          <tr><th class="text-left py-2 text-gray-600">受付日時</th><td class="py-2 font-mono text-xs">{{quote.created_at}}</td></tr>
        </table>
        <p class="mt-6 text-xs text-gray-400">※ チケット番号は今後の見積照会に必要です。</p>
        <div class="mt-4 flex gap-3">
          <router-link :to="'/quotes/'+quote.id" class="px-4 py-2 bg-violet-600 text-white rounded font-bold text-sm">詳細を開く</router-link>
          <router-link to="/quotes" class="px-4 py-2 bg-gray-200 text-gray-700 rounded font-bold text-sm">見積一覧へ</router-link>
        </div>
      </div>
    </main>
    <main v-else-if="error" class="max-w-3xl mx-auto px-6 mt-8">
      <div class="bg-red-50 border-2 border-red-200 p-4 rounded text-red-700">{{error}}</div>
    </main>
  </div>`,
  setup(){
    const route=useRoute()
    const quote=ref(null), error=ref('')
    onMounted(async()=>{
      const ticket=route.query.ticket
      if(!ticket){error.value='チケット番号が指定されていません'; return}
      const res=await fetch('/api/quotes/by-ticket/'+ticket)
      const j=await res.json()
      if(!res.ok){error.value=j.error||'取得失敗'; return}
      quote.value=j.quote
    })
    function logout(){localStorage.removeItem('user');window.location.href='/'}
    return {quote,error,logout,fmt}
  }
}

/* ─────────── Router ─────────── */
const routes = [
  { path: '/', component: LoginPage },
  { path: '/dashboard', component: DashboardPage },
  { path: '/customers', component: CustomersPage },
  { path: '/customers/:id', component: CustomerDetailPage },
  { path: '/quotes', component: QuotesPage },
  { path: '/quotes/new', component: QuoteNewPage },
  { path: '/quotes/confirm', component: QuoteConfirmPage },
  { path: '/quotes/complete', component: QuoteCompletePage },
  { path: '/quotes/:id', component: QuoteDetailPage },
]
const router = createRouter({ history: createWebHistory('/'), routes })
createApp({ template:'<router-view />' }).use(router).mount('#app')
</script>
</body>
</html>
