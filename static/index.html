<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DAST Demo Site (見積システム)</title>
  <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
  <script src="https://unpkg.com/vue-router@4/dist/vue-router.global.prod.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    .bar { border-radius:6px 6px 0 0; transition:height .6s; }
    .grid-pattern { background-image: linear-gradient(rgba(255,255,255,.04) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,.04) 1px, transparent 1px); background-size: 24px 24px; }
    .ticket-stub { background: repeating-linear-gradient(45deg, #fff8e6, #fff8e6 12px, #ffeac0 12px, #ffeac0 14px); }
    .glow { box-shadow: 0 0 40px rgba(99,102,241,.4); }
  </style>
</head>
<body class="min-h-screen bg-slate-100">
<div id="app"></div>

<footer style="border-top:1px solid #e5e7eb;padding:16px 20px;text-align:center;font-size:12px;color:#9ca3af;margin-top:40px">
  <p>&copy; 2026 DAST Demo Site (見積システム) <a href="/search" style="color:#cbd5e1;font-size:10px;text-decoration:none;margin-left:6px">·</a> <a href="/admin/export" style="color:#cbd5e1;font-size:10px;text-decoration:none">·</a></p>
</footer>

<script>
const { createApp, ref, reactive, onMounted, watch, computed } = Vue
const { createRouter, createWebHistory, useRoute, useRouter } = VueRouter

const fmt = n => new Intl.NumberFormat('ja-JP').format(n||0)
const STATUS_LABEL = { draft:'下書き', sent:'送付済', accepted:'受注', rejected:'失注' }
const STATUS_COLOR = { draft:'bg-gray-400', sent:'bg-blue-500', accepted:'bg-emerald-500', rejected:'bg-red-500' }
const AVATAR_COLORS = ['bg-rose-500','bg-amber-500','bg-emerald-500','bg-sky-500','bg-violet-500','bg-pink-500','bg-teal-500','bg-orange-500']

/* ─────────── 共通ヘッダー ─────────── */
const AppHeader = {
  props:['current'],
  template:`
  <header class="bg-gradient-to-r from-indigo-900 via-indigo-700 to-purple-700 sticky top-0 z-50 shadow-xl">
    <div class="max-w-6xl mx-auto px-6 h-14 flex items-center justify-between">
      <div class="flex items-center gap-6">
        <router-link to="/dashboard" class="font-bold text-lg text-white tracking-wide flex items-center gap-2">📋 DAST Demo Site</router-link>
        <nav class="flex gap-1">
          <router-link to="/dashboard" class="px-3 py-1.5 rounded text-sm" :class="current==='dashboard'?'bg-white/25 text-white font-semibold':'text-indigo-200 hover:bg-white/10 hover:text-white'">ダッシュボード</router-link>
          <router-link to="/customers" class="px-3 py-1.5 rounded text-sm" :class="current==='customers'?'bg-white/25 text-white font-semibold':'text-indigo-200 hover:bg-white/10 hover:text-white'">顧客</router-link>
          <router-link to="/quotes" class="px-3 py-1.5 rounded text-sm" :class="current==='quotes'?'bg-white/25 text-white font-semibold':'text-indigo-200 hover:bg-white/10 hover:text-white'">見積</router-link>
          <router-link to="/quotes/new" class="px-3 py-1.5 rounded text-sm" :class="current==='new'?'bg-white/25 text-white font-semibold':'text-indigo-200 hover:bg-white/10 hover:text-white'">+ 新規見積</router-link>
        </nav>
      </div>
      <button @click="$emit('logout')" class="text-indigo-200 hover:text-white text-sm">ログアウト</button>
    </div>
  </header>`
}

/* ═══════════════════════ LOGIN (夜空+グロー) ═══════════════════════ */
const LoginPage = {
  template:`
  <div class="min-h-screen flex items-center justify-center bg-gradient-to-br from-slate-950 via-indigo-950 to-purple-950 relative overflow-hidden">
    <div class="absolute inset-0 grid-pattern"></div>
    <div class="absolute top-20 left-20 w-96 h-96 bg-indigo-500 rounded-full filter blur-3xl opacity-20"></div>
    <div class="absolute bottom-20 right-20 w-96 h-96 bg-purple-500 rounded-full filter blur-3xl opacity-20"></div>
    <div class="relative w-full max-w-sm mx-4">
      <div class="text-center mb-6">
        <div class="inline-flex items-center justify-center w-20 h-20 rounded-3xl bg-gradient-to-br from-indigo-500 to-purple-600 glow mb-4"><span class="text-4xl">📋</span></div>
        <h1 class="text-3xl font-black text-white">DAST Demo Site</h1>
        <p class="text-indigo-300 text-sm mt-1">見積システム</p>
      </div>
      <div class="bg-white/10 backdrop-blur-xl border border-white/20 rounded-2xl p-8 shadow-2xl">
        <h2 class="text-lg font-bold text-white mb-5">ログイン</h2>
        <form @submit.prevent="doLogin">
          <div class="mb-4">
            <label class="block text-xs font-medium text-indigo-200 mb-1.5">メールアドレス</label>
            <input v-model="email" type="text" placeholder="admin@3sec-demo.com" class="w-full px-4 py-2.5 bg-white/10 border-2 border-white/20 rounded-lg text-sm text-white placeholder-indigo-300 focus:outline-none focus:border-indigo-400">
          </div>
          <div class="mb-5">
            <label class="block text-xs font-medium text-indigo-200 mb-1.5">パスワード</label>
            <input v-model="password" type="password" placeholder="••••••••" class="w-full px-4 py-2.5 bg-white/10 border-2 border-white/20 rounded-lg text-sm text-white placeholder-indigo-300 focus:outline-none focus:border-indigo-400">
          </div>
          <div v-if="error" class="mb-4 p-3 rounded-lg bg-red-500/20 border border-red-400/40 text-red-200 text-sm" v-html="error"></div>
          <button type="submit" class="w-full bg-gradient-to-r from-indigo-500 to-purple-500 hover:from-indigo-600 hover:to-purple-600 text-white font-bold py-3 rounded-lg text-sm shadow-lg shadow-indigo-500/40">ログイン</button>
        </form>
      </div>
    </div>
  </div>`,
  setup(){
    const email=ref(''), password=ref(''), error=ref('')
    const router=useRouter()
    async function doLogin(){
      const res=await fetch('/api/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email:email.value,password:password.value})})
      const data=await res.json()
      if(data.success){localStorage.setItem('user',JSON.stringify(data.user));router.push('/dashboard')}
      else{error.value=data.error}
    }
    return {email,password,error,doLogin}
  }
}

/* ═══════════════════════ DASHBOARD (青、KPI+棒グラフ) ═══════════════════════ */
const DashboardPage = {
  components:{AppHeader},
  template:`
  <div class="bg-slate-50 min-h-screen">
    <AppHeader current="dashboard" @logout="logout"/>
    <div class="bg-gradient-to-br from-indigo-800 via-indigo-700 to-blue-700 px-6 py-8">
      <div class="max-w-6xl mx-auto">
        <p class="text-indigo-200 text-xs uppercase tracking-widest">DASHBOARD</p>
        <h1 class="text-3xl font-black text-white mt-1">ダッシュボード</h1>
        <p class="text-indigo-200 text-sm mt-2">{{user?.name||'ゲスト'}}さん、こんにちは</p>
      </div>
    </div>
    <main class="max-w-6xl mx-auto px-6 -mt-6">
      <div class="grid grid-cols-4 gap-4 mb-6">
        <div class="rounded-2xl p-5 shadow-xl bg-white border border-gray-100">
          <p class="text-xs font-bold text-gray-400 uppercase mb-2">📋 作成済み</p>
          <p class="text-4xl font-black text-gray-800">{{stats.total}}</p>
          <p class="text-xs text-gray-400 mt-1">件</p>
        </div>
        <div class="rounded-2xl p-5 shadow-xl bg-gradient-to-br from-blue-500 to-blue-600 text-white">
          <p class="text-xs font-bold uppercase mb-2">📤 送付済</p>
          <p class="text-4xl font-black">{{stats.sent}}</p>
          <p class="text-xs text-blue-100 mt-1">件</p>
        </div>
        <div class="rounded-2xl p-5 shadow-xl bg-gradient-to-br from-emerald-500 to-emerald-600 text-white">
          <p class="text-xs font-bold uppercase mb-2">✅ 受注</p>
          <p class="text-4xl font-black">{{stats.accepted}}</p>
          <p class="text-xs text-emerald-100 mt-1">件</p>
        </div>
        <div class="rounded-2xl p-5 shadow-xl bg-gradient-to-br from-amber-500 to-orange-600 text-white">
          <p class="text-xs font-bold uppercase mb-2">💰 受注額</p>
          <p class="text-2xl font-black">¥{{fmt(stats.acceptedTotal)}}</p>
          <p class="text-xs text-amber-100 mt-1">YTD</p>
        </div>
      </div>
      <div class="grid grid-cols-3 gap-4 mb-6">
        <div class="col-span-2 bg-white rounded-2xl p-6 shadow-xl border border-gray-100">
          <h3 class="text-sm font-bold text-gray-700 mb-4">📊 ステータス別 件数</h3>
          <div class="flex items-end gap-4 h-44">
            <div v-for="s in ['draft','sent','accepted','rejected']" :key="s" class="flex-1 flex flex-col items-center gap-2">
              <div class="text-xs font-bold text-gray-500">{{statusCount(s)}}</div>
              <div class="bar w-full" :class="STATUS_COLOR[s]" :style="{height: (statusCount(s)/Math.max(stats.total,1)*100*1.4 || 6)+'%', minHeight:'8px'}"></div>
              <span class="text-xs font-bold text-gray-600">{{STATUS_LABEL[s]}}</span>
            </div>
          </div>
        </div>
        <div class="bg-gradient-to-br from-slate-800 to-slate-900 rounded-2xl p-6 shadow-xl text-white">
          <h3 class="text-sm font-bold mb-4">🎯 受注率</h3>
          <p class="text-6xl font-black">{{Math.round(stats.accepted/Math.max(stats.total,1)*100)}}<span class="text-2xl">%</span></p>
          <p class="text-xs text-slate-400 mt-2">対全見積</p>
        </div>
      </div>
      <div class="bg-white rounded-2xl shadow-xl overflow-hidden border border-gray-100">
        <div class="px-6 py-4 bg-gradient-to-r from-slate-50 to-slate-100 border-b border-gray-200 flex justify-between items-center">
          <h3 class="text-sm font-bold text-gray-700">🕐 最近の見積</h3>
          <router-link to="/quotes" class="text-indigo-600 text-xs font-medium hover:underline">すべて →</router-link>
        </div>
        <table class="w-full text-sm">
          <thead><tr class="bg-slate-700 text-white">
            <th class="text-left px-4 py-2">チケット</th><th class="text-left px-4 py-2">顧客</th><th class="text-left px-4 py-2">タイトル</th><th class="text-right px-4 py-2">金額</th><th class="text-left px-4 py-2">状態</th>
          </tr></thead>
          <tbody>
            <tr v-for="q in recentQuotes" :key="q.id" class="border-b border-gray-100 hover:bg-indigo-50 cursor-pointer" @click="$router.push('/quotes/'+q.id)">
              <td class="px-4 py-2 font-mono text-indigo-700 font-bold">{{q.ticket}}</td>
              <td class="px-4 py-2">{{q.customer_company}}</td>
              <td class="px-4 py-2">{{q.title}}</td>
              <td class="px-4 py-2 text-right font-mono">¥{{fmt(q.total)}}</td>
              <td class="px-4 py-2"><span class="px-2 py-1 rounded text-xs font-bold text-white" :class="STATUS_COLOR[q.status]">{{STATUS_LABEL[q.status]}}</span></td>
            </tr>
          </tbody>
        </table>
      </div>
    </main>
  </div>`,
  setup(){
    const user=ref(JSON.parse(localStorage.getItem('user')||'null'))
    const quotes=ref([])
    const stats=reactive({total:0,sent:0,accepted:0,acceptedTotal:0,draft:0,rejected:0})
    const recentQuotes=computed(()=>quotes.value.slice(0,6))
    const statusCount=(s)=>quotes.value.filter(q=>q.status===s).length
    onMounted(async()=>{
      const res=await fetch('/api/quotes'); const j=await res.json()
      quotes.value=j.quotes||[]
      stats.total=quotes.value.length
      stats.sent=statusCount('sent'); stats.accepted=statusCount('accepted')
      stats.draft=statusCount('draft'); stats.rejected=statusCount('rejected')
      stats.acceptedTotal=quotes.value.filter(q=>q.status==='accepted').reduce((s,q)=>s+(q.total||0),0)
    })
    function logout(){localStorage.removeItem('user');window.location.href='/'}
    return {user,quotes,stats,recentQuotes,statusCount,logout,fmt,STATUS_LABEL,STATUS_COLOR}
  }
}

/* ═══════════════════════ CUSTOMERS LIST (緑、テーブル) ═══════════════════════ */
const CustomersPage = {
  components:{AppHeader},
  template:`
  <div class="bg-emerald-50 min-h-screen">
    <AppHeader current="customers" @logout="logout"/>
    <div class="bg-gradient-to-r from-emerald-700 via-teal-600 to-emerald-700 px-6 py-8">
      <div class="max-w-6xl mx-auto">
        <p class="text-emerald-200 text-xs uppercase tracking-widest">CUSTOMERS</p>
        <h1 class="text-3xl font-black text-white mt-1">顧客一覧 🏢</h1>
        <p class="text-emerald-200 text-sm mt-2">{{customers.length}}件の取引先</p>
      </div>
    </div>
    <main class="max-w-6xl mx-auto px-6 -mt-6">
      <div class="bg-white rounded-2xl shadow-xl overflow-hidden border border-emerald-100">
        <div class="px-5 py-4 bg-gradient-to-r from-emerald-50 to-teal-50 border-b-2 border-emerald-300 flex items-center gap-3">
          <input v-model="search" @keyup.enter="doSearch" type="text" placeholder="🔍 会社名 / 担当者名" class="flex-1 px-4 py-2.5 bg-white border-2 border-emerald-300 rounded-lg text-sm focus:outline-none focus:border-emerald-500">
          <button @click="doSearch" class="px-6 py-2.5 bg-emerald-600 hover:bg-emerald-700 text-white rounded-lg text-sm font-bold">検索</button>
        </div>
        <div v-if="errorHtml" class="m-4 p-3 bg-red-50 border-2 border-red-200 text-red-700 rounded" v-html="errorHtml"></div>
        <table class="w-full text-sm">
          <thead><tr class="bg-emerald-800 text-white">
            <th class="text-left px-4 py-3">ID</th><th class="text-left px-4 py-3">会社名</th><th class="text-left px-4 py-3">業種</th><th class="text-left px-4 py-3">担当者</th><th class="text-left px-4 py-3">メール</th><th class="text-right px-4 py-3">売上規模</th><th></th>
          </tr></thead>
          <tbody>
            <tr v-for="c in customers" :key="c.id" class="border-b border-emerald-100 hover:bg-emerald-50">
              <td class="px-4 py-3 font-mono text-gray-500">{{c.id}}</td>
              <td class="px-4 py-3 font-bold text-emerald-900">{{c.company}}</td>
              <td class="px-4 py-3"><span class="px-2 py-0.5 bg-emerald-100 text-emerald-700 rounded text-xs font-bold">{{c.industry}}</span></td>
              <td class="px-4 py-3">{{c.name}}</td>
              <td class="px-4 py-3 text-gray-600">{{c.email}}</td>
              <td class="px-4 py-3 text-right font-mono">¥{{fmt(c.annual_revenue)}}</td>
              <td class="px-4 py-3"><router-link :to="'/customers/'+c.id" class="text-emerald-700 text-xs font-bold underline">詳細 →</router-link></td>
            </tr>
          </tbody>
        </table>
      </div>
    </main>
  </div>`,
  setup(){
    const search=ref(''), customers=ref([]), errorHtml=ref('')
    async function doSearch(){
      errorHtml.value=''
      const url='/api/customers'+(search.value?'?q='+encodeURIComponent(search.value):'')
      const res=await fetch(url); const j=await res.json()
      if(j.error){errorHtml.value=j.error+'<br><code>'+j.sql+'</code>'; customers.value=[]}
      else{customers.value=j.customers||[]}
    }
    onMounted(doSearch)
    function logout(){localStorage.removeItem('user');window.location.href='/'}
    return {search,customers,errorHtml,doSearch,logout,fmt}
  }
}

/* ═══════════════════════ CUSTOMER DETAIL (シアン、サイドカード) ═══════════════════════ */
const CustomerDetailPage = {
  components:{AppHeader},
  template:`
  <div class="bg-cyan-50 min-h-screen">
    <AppHeader current="customers" @logout="logout"/>
    <div class="bg-gradient-to-br from-cyan-700 via-sky-600 to-cyan-800 px-6 py-8">
      <div class="max-w-5xl mx-auto">
        <div class="text-xs text-cyan-200 mb-1">
          <router-link to="/customers" class="hover:text-white">顧客一覧</router-link>
          <span class="mx-2">›</span><span class="text-white">{{customer?.company || '...'}}</span>
        </div>
        <h1 class="text-3xl font-black text-white mt-1">{{customer?.company || '...'}}</h1>
        <p class="text-cyan-200 text-sm mt-1">{{customer?.industry || ''}}</p>
      </div>
    </div>
    <main class="max-w-5xl mx-auto px-6 -mt-6" v-if="customer">
      <div class="grid grid-cols-3 gap-5">
        <div class="bg-white rounded-2xl shadow-xl p-6 border border-cyan-100">
          <div class="text-center mb-4">
            <div class="inline-flex items-center justify-center w-20 h-20 rounded-2xl bg-gradient-to-br from-cyan-500 to-sky-600 text-white text-3xl font-black shadow-lg">{{customer.company[0]}}</div>
            <h2 class="font-bold text-lg mt-3">{{customer.company}}</h2>
            <p class="text-xs text-gray-500">ID: {{customer.id}}</p>
          </div>
          <div class="border-t pt-3 space-y-1.5 text-sm">
            <p><span class="text-gray-400">💼</span> {{customer.industry}}</p>
            <p><span class="text-gray-400">👤</span> {{customer.name}}</p>
            <p><span class="text-gray-400">✉️</span> <span class="text-cyan-700">{{customer.email}}</span></p>
            <p><span class="text-gray-400">📞</span> {{customer.phone}}</p>
            <p><span class="text-gray-400">📍</span> {{customer.address}}</p>
          </div>
          <div class="mt-4 pt-3 border-t">
            <p class="text-xs text-gray-500 mb-1">売上規模</p>
            <p class="text-2xl font-black text-cyan-700">¥{{fmt(customer.annual_revenue)}}</p>
          </div>
        </div>
        <div class="col-span-2 space-y-5">
          <div class="bg-gradient-to-br from-orange-100 to-amber-100 rounded-2xl shadow-xl p-6 border border-orange-200">
            <div class="flex justify-between items-center mb-3">
              <h3 class="font-bold text-orange-900">👥 担当者 ({{contacts.length}})</h3>
              <router-link :to="'/customers/'+customer.id+'/contacts'" class="text-orange-700 text-xs font-bold underline">詳細を見る →</router-link>
            </div>
            <div class="grid grid-cols-3 gap-3">
              <router-link v-for="(ct,idx) in contacts.slice(0,6)" :key="ct.id" :to="'/customers/'+customer.id+'/contacts/'+ct.id" class="bg-white rounded-lg p-3 hover:shadow-md">
                <div class="flex items-center gap-2">
                  <div class="w-9 h-9 rounded-full text-white font-bold flex items-center justify-center text-sm" :class="AVATAR_COLORS[idx%AVATAR_COLORS.length]">{{ct.name[0]}}</div>
                  <div class="flex-1 min-w-0">
                    <p class="text-xs font-bold truncate">{{ct.name}}</p>
                    <p class="text-xs text-gray-500 truncate">{{ct.role}}</p>
                  </div>
                </div>
              </router-link>
            </div>
          </div>
          <div class="bg-white rounded-2xl shadow-xl p-6 border border-cyan-100">
            <h3 class="font-bold text-cyan-900 mb-3">📊 関連見積</h3>
            <table class="w-full text-sm">
              <tr v-for="q in relatedQuotes" :key="q.id" class="border-b">
                <td class="py-2 font-mono text-violet-700 font-bold">{{q.ticket}}</td>
                <td class="py-2">{{q.title}}</td>
                <td class="py-2 text-right font-mono">¥{{fmt(q.total)}}</td>
                <td class="py-2"><span class="px-2 py-0.5 rounded text-xs text-white" :class="STATUS_COLOR[q.status]">{{STATUS_LABEL[q.status]}}</span></td>
              </tr>
              <tr v-if="!relatedQuotes.length"><td colspan="4" class="py-4 text-center text-gray-400">関連見積なし</td></tr>
            </table>
          </div>
        </div>
      </div>
    </main>
    <main v-else-if="error" class="max-w-3xl mx-auto px-6 mt-8">
      <div class="bg-red-50 border-2 border-red-200 p-4 rounded text-red-700" v-html="error"></div>
    </main>
  </div>`,
  setup(){
    const route=useRoute()
    const customer=ref(null), contacts=ref([]), relatedQuotes=ref([]), error=ref('')
    async function load(){
      error.value=''; customer.value=null
      const res=await fetch('/api/customers/'+route.params.cid)
      const j=await res.json()
      if(j.error){error.value=j.error+(j.sql?'<br><code>'+j.sql+'</code>':'')}
      else{customer.value=j.customer; contacts.value=j.contacts||[]
        const qres=await fetch('/api/quotes'); const qj=await qres.json()
        relatedQuotes.value=(qj.quotes||[]).filter(q=>q.customer_id==route.params.cid).slice(0,5)
      }
    }
    onMounted(load); watch(()=>route.params.cid, load)
    function logout(){localStorage.removeItem('user');window.location.href='/'}
    return {customer,contacts,relatedQuotes,error,logout,fmt,STATUS_LABEL,STATUS_COLOR,AVATAR_COLORS}
  }
}

/* ═══════════════════════ CONTACTS LIST (オレンジ、アバターグリッド) ═══════════════════════ */
const CustomerContactsPage = {
  components:{AppHeader},
  template:`

          <span class="mx-2">›</span>
          <router-link :to="'/customers/'+route.params.cid" class="hover:text-white">{{customer?.company||'...'}}</router-link>
          <span class="mx-2">›</span><span class="text-white">担当者</span>
        </div>

            <textarea v-model="notes" rows="3" class="w-full px-4 py-2.5 bg-yellow-50 border-2 border-yellow-300 rounded-lg text-sm resize-none"></textarea></div>
          <div v-if="error" class="mb-4 p-3 bg-red-50 border-2 border-red-200 text-red-600 text-sm rounded">{{error}}</div>
          <button type="submit" class="w-full py-3 bg-gradient-to-r from-yellow-500 to-amber-600 text-white rounded-lg font-bold">確認画面へ →</button>
        </form>
      </div>
    </main>
  </div>`,
  setup(){
    const router=useRouter()
    const customers=ref([])
    const customer_id=ref(''), title=ref(''), total=ref(''), valid_until=ref('2026-12-31'), notes=ref(''), error=ref('')
    onMounted(async()=>{const r=await fetch('/api/customers'); const j=await r.json(); customers.value=j.customers||[]})
    async function goConfirm(){
      error.value=''
      const payload={customer_id:customer_id.value,title:title.value,total:total.value,valid_until:valid_until.value,notes:notes.value}
      const res=await fetch('/api/quotes/confirm',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)})
      if(!res.ok){const j=await res.json(); error.value=j.error||'入力エラー'; return}
      sessionStorage.setItem('quote_draft',JSON.stringify({...payload,customer_company:(customers.value.find(c=>c.id==customer_id.value)||{}).company}))
      router.push('/quotes/confirm')
    }
    function logout(){localStorage.removeItem('user');window.location.href='/'}
    return {customers,customer_id,title,total,valid_until,notes,error,goConfirm,logout}
  }
}

/* ═══════════════════════ QUOTE CONFIRM (アンバー、確認) ═══════════════════════ */
const QuoteConfirmPage = {
  components:{AppHeader},
  template:`
  <div class="bg-amber-50 min-h-screen">
    <AppHeader current="new" @logout="logout"/>
    <div class="bg-gradient-to-r from-amber-600 to-orange-600 px-6 py-8">
      <div class="max-w-3xl mx-auto"><h1 class="text-3xl font-black text-white">⚠️ 入力内容確認</h1><p class="text-amber-100 text-sm mt-1">Step 2/3 - 確認</p></div>
    </div>
    <main class="max-w-3xl mx-auto px-6 -mt-6">
      <div v-if="draft" class="bg-white rounded-2xl shadow-xl p-8 border-4 border-amber-300">
        <div class="flex items-center gap-2 mb-5 text-xs">
          <div class="px-3 py-1 bg-gray-200 text-gray-500 rounded">入力</div>
          <span class="text-gray-300">›</span>
          <div class="px-3 py-1 bg-amber-500 text-white rounded font-bold">確認</div>
          <span class="text-gray-300">›</span>
          <div class="px-3 py-1 bg-gray-200 text-gray-500 rounded">完了</div>
        </div>
        <p class="text-sm text-gray-600 mb-5">下記の内容で見積を作成します。</p>
        <table class="w-full mb-6">
          <tr class="border-b"><th class="text-left py-2 text-amber-700 w-32">顧客</th><td class="py-2" v-html="draft.customer_company"></td></tr>
          <tr class="border-b"><th class="text-left py-2 text-amber-700">タイトル</th><td class="py-2" v-html="draft.title"></td></tr>
          <tr class="border-b"><th class="text-left py-2 text-amber-700">小計</th><td class="py-2 font-mono">¥{{fmt(parseInt(draft.total||0))}}</td></tr>
          <tr class="border-b"><th class="text-left py-2 text-amber-700">税</th><td class="py-2 font-mono">¥{{fmt(Math.floor(parseInt(draft.total||0)*0.1))}}</td></tr>
          <tr class="border-b"><th class="text-left py-2 text-amber-700 font-bold">合計</th><td class="py-2 font-mono font-bold text-xl">¥{{fmt(Math.floor(parseInt(draft.total||0)*1.1))}}</td></tr>
          <tr class="border-b"><th class="text-left py-2 text-amber-700">期日</th><td class="py-2">{{draft.valid_until}}</td></tr>
          <tr><th class="text-left py-2 text-amber-700 align-top">備考</th><td class="py-2 whitespace-pre-wrap" v-html="draft.notes"></td></tr>
        </table>
        <div v-if="error" class="mb-4 p-3 bg-red-50 border-2 border-red-200 text-red-600 text-sm rounded">{{error}}</div>
        <div class="flex gap-3">
          <router-link to="/quotes/new" class="flex-1 py-3 bg-gray-200 text-gray-700 rounded-lg font-bold text-sm text-center">← 修正</router-link>
          <button @click="submit" class="flex-1 py-3 bg-gradient-to-r from-amber-500 to-orange-600 text-white rounded-lg font-bold">作成する</button>
        </div>
      </div>
      <div v-else class="bg-white rounded-2xl shadow-xl p-8 text-center">
        <p class="text-5xl mb-3">⚠️</p>
        <p class="text-gray-600 mb-4">入力データがありません</p>
        <router-link to="/quotes/new" class="inline-block px-6 py-2.5 bg-amber-600 text-white rounded-lg font-bold">新規作成へ</router-link>
      </div>
    </main>
  </div>`,
  setup(){
    const router=useRouter()
    const draft=ref(null), error=ref('')
    onMounted(()=>{const raw=sessionStorage.getItem('quote_draft'); if(raw){try{draft.value=JSON.parse(raw)}catch(e){}}})
    async function submit(){
      error.value=''
      const res=await fetch('/api/quotes/submit',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(draft.value)})
      const j=await res.json()
      if(!res.ok||!j.success){error.value=j.error||'送信失敗'; return}
      sessionStorage.removeItem('quote_draft')
      router.push('/quotes/complete?ticket='+j.ticket)
    }
    function logout(){localStorage.removeItem('user');window.location.href='/'}
    return {draft,error,submit,logout,fmt}
  }
}

/* ═══════════════════════ QUOTE COMPLETE (エメラルド、お祝い) ═══════════════════════ */
const QuoteCompletePage = {
  components:{AppHeader},
  template:`
  <div class="bg-gradient-to-br from-emerald-50 to-teal-100 min-h-screen">
    <AppHeader current="quotes" @logout="logout"/>
    <div class="bg-gradient-to-r from-emerald-600 to-teal-600 px-6 py-8">
      <div class="max-w-3xl mx-auto"><h1 class="text-3xl font-black text-white">🎉 作成完了</h1><p class="text-emerald-100 text-sm mt-1">Step 3/3 - 完了</p></div>
    </div>
    <main class="max-w-3xl mx-auto px-6 -mt-6" v-if="quote">
      <div class="bg-white rounded-3xl shadow-2xl p-10 border-4 border-emerald-300">
        <div class="flex items-center gap-2 mb-5 text-xs">
          <div class="px-3 py-1 bg-gray-200 text-gray-500 rounded">入力</div>
          <span class="text-gray-300">›</span>
          <div class="px-3 py-1 bg-gray-200 text-gray-500 rounded">確認</div>
          <span class="text-gray-300">›</span>
          <div class="px-3 py-1 bg-emerald-500 text-white rounded font-bold">完了</div>
        </div>
        <div class="text-center mb-6">
          <div class="inline-flex w-24 h-24 rounded-full bg-gradient-to-br from-emerald-400 to-teal-500 items-center justify-center text-5xl mb-3 shadow-2xl">✅</div>
          <h2 class="text-2xl font-black text-emerald-700">見積を作成しました</h2>
          <p class="text-sm text-gray-500 mt-2">チケット番号</p>
          <p class="text-4xl font-black font-mono text-emerald-700 mt-1">{{quote.ticket}}</p>
        </div>
        <div class="bg-emerald-50 rounded-xl p-5 mb-5">
          <table class="w-full text-sm">
            <tr><th class="text-left py-1.5 text-emerald-700 w-24">顧客</th><td class="py-1.5 font-bold">{{quote.customer_company}}</td></tr>
            <tr><th class="text-left py-1.5 text-emerald-700">タイトル</th><td class="py-1.5">{{quote.title}}</td></tr>
            <tr><th class="text-left py-1.5 text-emerald-700">合計</th><td class="py-1.5 font-mono font-bold">¥{{fmt(quote.total+quote.tax)}}</td></tr>
          </table>
        </div>
        <div class="flex gap-3">
          <router-link :to="'/quotes/'+quote.id" class="flex-1 px-4 py-3 bg-emerald-600 text-white rounded-lg font-bold text-sm text-center">詳細を開く</router-link>
          <router-link to="/quotes" class="flex-1 px-4 py-3 bg-gray-200 text-gray-700 rounded-lg font-bold text-sm text-center">見積一覧へ</router-link>
        </div>
      </div>
    </main>
    <main v-else-if="error" class="max-w-3xl mx-auto px-6 mt-8">
      <div class="bg-red-50 border-2 border-red-200 p-4 rounded text-red-700">{{error}}</div>
    </main>
  </div>`,
  setup(){
    const route=useRoute()
    const quote=ref(null), error=ref('')
    onMounted(async()=>{
      const ticket=route.query.ticket
      if(!ticket){error.value='チケット番号が指定されていません'; return}
      const res=await fetch('/api/quotes/by-ticket/'+ticket)
      const j=await res.json()
      if(!res.ok){error.value=j.error||'取得失敗'; return}
      quote.value=j.quote
    })
    function logout(){localStorage.removeItem('user');window.location.href='/'}
    return {quote,error,logout,fmt}
  }
}

/* ─────────── Router ─────────── */
const routes = [
  { path:'/', component:LoginPage },
  { path:'/dashboard', component:DashboardPage },
  { path:'/customers', component:CustomersPage },
  { path:'/customers/:cid', component:CustomerDetailPage },
  { path:'/customers/:cid/contacts', component:CustomerContactsPage },
  { path:'/customers/:cid/contacts/:contact_id', component:ContactDetailPage },
  { path:'/contacts/:contact_id', component:ContactDetailPage },
  { path:'/quotes', component:QuotesPage },
  { path:'/quotes/new', component:QuoteNewPage },
  { path:'/quotes/confirm', component:QuoteConfirmPage },
  { path:'/quotes/complete', component:QuoteCompletePage },
  { path:'/quotes/:qid', component:QuoteDetailPage },
  { path:'/quotes/:qid/items', component:QuoteItemsPage },
]
const router = createRouter({ history: createWebHistory('/'), routes })
createApp({ template:'<router-view />' }).use(router).mount('#app')
</script>
</body>
