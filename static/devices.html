<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>IoT Portal - Device Management</title>
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.7/css/bootstrap.min.css">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <nav class="navbar navbar-inverse navbar-fixed-top">
        <div class="container-fluid">
            <div class="navbar-header">
                <button type="button" class="navbar-toggle collapsed" data-toggle="collapse" data-target="#navbar">
                    <span class="sr-only">Toggle navigation</span>
                    <span class="icon-bar"></span>
                    <span class="icon-bar"></span>
                    <span class="icon-bar"></span>
                </button>
                <a class="navbar-brand" href="/dashboard.html"><i class="glyphicon glyphicon-cloud"></i> IoT Portal</a>
            </div>
            <div id="navbar" class="navbar-collapse collapse">
                <ul class="nav navbar-nav">
                    <li><a href="/dashboard.html"><i class="glyphicon glyphicon-dashboard"></i> Dashboard</a></li>
                    <li class="active"><a href="/devices.html"><i class="glyphicon glyphicon-hdd"></i> Devices</a></li>
                    <li><a href="/admin.html"><i class="glyphicon glyphicon-cog"></i> Admin</a></li>
                </ul>
                <ul class="nav navbar-nav navbar-right">
                    <li><a id="userName" href="#"></a></li>
                    <li><a href="#" id="logoutBtn"><i class="glyphicon glyphicon-log-out"></i> Logout</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container-fluid" style="margin-top:60px;">
        <h2><i class="glyphicon glyphicon-hdd"></i> Device Management</h2>
        <hr>

        <div class="row">
            <!-- Add Device Form -->
            <div class="col-md-4">
                <div class="panel panel-primary">
                    <div class="panel-heading">
                        <h3 class="panel-title"><i class="glyphicon glyphicon-plus"></i> Add New Device</h3>
                    </div>
                    <div class="panel-body">
                        <div id="addDeviceAlert" style="display:none;"></div>
                        <form id="addDeviceForm">
                            <div class="form-group">
                                <label>Device Name</label>
                                <input type="text" class="form-control" id="deviceName" placeholder="e.g. Temperature Sensor #1" required>
                            </div>
                            <div class="form-group">
                                <label>Device Type</label>
                                <select class="form-control" id="deviceType">
                                    <option value="sensor">Sensor</option>
                                    <option value="actuator">Actuator</option>
                                    <option value="gateway">Gateway</option>
                                    <option value="camera">Camera</option>
                                    <option value="controller">Controller</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label>Location</label>
                                <input type="text" class="form-control" id="deviceLocation" placeholder="e.g. Building A, Floor 2">
                            </div>
                            <div class="form-group">
                                <label>IP Address</label>
                                <input type="text" class="form-control" id="deviceIP" placeholder="e.g. 192.168.1.100">
                            </div>
                            <div class="form-group">
                                <label>Firmware Version</label>
                                <input type="text" class="form-control" id="deviceFirmware" placeholder="e.g. v2.1.3">
                            </div>
                            <button type="submit" class="btn btn-primary btn-block"><i class="glyphicon glyphicon-plus"></i> Add Device</button>
                        </form>
                    </div>
                </div>
            </div>

            <!-- Device Table -->
            <div class="col-md-8">
                <div class="panel panel-default">
                    <div class="panel-heading">
                        <h3 class="panel-title"><i class="glyphicon glyphicon-list"></i> Registered Devices</h3>
                    </div>
                    <div class="panel-body">
                        <div class="table-responsive">
                            <table class="table table-striped table-bordered table-hover">
                                <thead>
                                    <tr>
                                        <th>ID</th>
                                        <th>Name</th>
                                        <th>Type</th>
                                        <th>Location</th>
                                        <th>Status</th>
                                        <th>IP Address</th>
                                        <th>Firmware</th>
                                        <th>Actions</th>
                                    </tr>
                                </thead>
                                <tbody id="deviceTableBody">
                                    <tr><td colspan="8" class="text-center text-muted">Loading devices...</td></tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Edit Device Modal -->
    <div class="modal fade" id="editDeviceModal" tabindex="-1" role="dialog">
        <div class="modal-dialog" role="document">
            <div class="modal-content">
                <div class="modal-header">
                    <button type="button" class="close" data-dismiss="modal"><span>&times;</span></button>
                    <h4 class="modal-title"><i class="glyphicon glyphicon-edit"></i> Edit Device</h4>
                </div>
                <div class="modal-body">
                    <form id="editDeviceForm">
                        <input type="hidden" id="editDeviceId">
                        <div class="form-group">
                            <label>Device Name</label>
                            <input type="text" class="form-control" id="editDeviceName" required>
                        </div>
                        <div class="form-group">
                            <label>Device Type</label>
                            <select class="form-control" id="editDeviceType">
                                <option value="sensor">Sensor</option>
                                <option value="actuator">Actuator</option>
                                <option value="gateway">Gateway</option>
                                <option value="camera">Camera</option>
                                <option value="controller">Controller</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>Location</label>
                            <input type="text" class="form-control" id="editDeviceLocation">
                        </div>
                        <div class="form-group">
                            <label>IP Address</label>
                            <input type="text" class="form-control" id="editDeviceIP">
                        </div>
                        <div class="form-group">
                            <label>Status</label>
                            <select class="form-control" id="editDeviceStatus">
                                <option value="online">Online</option>
                                <option value="offline">Offline</option>
                                <option value="warning">Warning</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>Firmware Version</label>
                            <input type="text" class="form-control" id="editDeviceFirmware">
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-default" data-dismiss="modal">Cancel</button>
                    <button type="button" class="btn btn-primary" id="saveDeviceBtn"><i class="glyphicon glyphicon-floppy-disk"></i> Save Changes</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-2.2.4.min.js"></script>
    <script src="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.7/js/bootstrap.min.js"></script>
    <script src="/js/app.js"></script>
    <script>
    $(function(){
        checkAuth();
        loadDeviceTable();
    });

    function loadDeviceTable() {
        $.get('/api/devices', function(devices) {
            var html = '';
            devices.forEach(function(d) {
                var statusClass = d.status === 'online' ? 'success' : d.status === 'offline' ? 'danger' : 'warning';
                html += '<tr>' +
                    '<td>' + d.id + '</td>' +
                    '<td>' + d.name + '</td>' +
                    '<td><span class="label label-default">' + d.type + '</span></td>' +
                    '<td>' + d.location + '</td>' +
                    '<td><span class="label label-' + statusClass + '">' + d.status + '</span></td>' +
                    '<td><code>' + d.ip_address + '</code></td>' +
                    '<td>' + d.firmware + '</td>' +
                    '<td>' +
                        '<button class="btn btn-xs btn-info editBtn" data-id="' + d.id + '"><i class="glyphicon glyphicon-edit"></i> Edit</button> ' +
                        '<button class="btn btn-xs btn-danger deleteBtn" data-id="' + d.id + '"><i class="glyphicon glyphicon-trash"></i> Delete</button>' +
                    '</td>' +
                    '</tr>';
            });
            $('#deviceTableBody').html(html);
        });
    }

    // Add device
    $('#addDeviceForm').on('submit', function(e) {
        e.preventDefault();
        var data = {
            name: $('#deviceName').val(),
            type: $('#deviceType').val(),
            location: $('#deviceLocation').val(),
            ip_address: $('#deviceIP').val(),
            firmware: $('#deviceFirmware').val()
        };
        $.ajax({
            url: '/api/devices',
            method: 'POST',
            contentType: 'application/json',
            data: JSON.stringify(data),
            success: function(res) {
                $('#addDeviceAlert').html('<div class="alert alert-success">Device added successfully!</div>').show();
                $('#addDeviceForm')[0].reset();
                loadDeviceTable();
            },
            error: function(xhr) {
                var msg = 'Failed to add device';
                try { msg = JSON.parse(xhr.responseText).error; } catch(e) {}
                $('#addDeviceAlert').html('<div class="alert alert-danger">' + msg + '</div>').show();
            }
        });
    });

    // Edit device
    $(document).on('click', '.editBtn', function() {
        var id = $(this).data('id');
        $.get('/api/devices/' + id, function(d) {
            $('#editDeviceId').val(d.id);
            $('#editDeviceName').val(d.name);
            $('#editDeviceType').val(d.type);
            $('#editDeviceLocation').val(d.location);
            $('#editDeviceIP').val(d.ip_address);
            $('#editDeviceStatus').val(d.status);
            $('#editDeviceFirmware').val(d.firmware);
            $('#editDeviceModal').modal('show');
        });
    });

    // Save edited device
    $('#saveDeviceBtn').on('click', function() {
        var id = $('#editDeviceId').val();
        var data = {
            name: $('#editDeviceName').val(),
            type: $('#editDeviceType').val(),
            location: $('#editDeviceLocation').val(),
            ip_address: $('#editDeviceIP').val(),
            status: $('#editDeviceStatus').val(),
            firmware: $('#editDeviceFirmware').val()
        };
        $.ajax({
            url: '/api/devices/' + id,
            method: 'PUT',
            contentType: 'application/json',
            data: JSON.stringify(data),
            success: function() {
                $('#editDeviceModal').modal('hide');
                loadDeviceTable();
            }
        });
    });

    // Delete device
    $(document).on('click', '.deleteBtn', function() {
        var id = $(this).data('id');
        if (confirm('Are you sure you want to delete device #' + id + '?')) {
            $.ajax({
                url: '/api/devices/' + id,
                method: 'DELETE',
                success: function() { loadDeviceTable(); }
            });
        }
    });
    </script>
</body>
</html>
