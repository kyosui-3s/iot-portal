<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>IoT Portal - Dashboard</title>
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.7/css/bootstrap.min.css">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <nav class="navbar navbar-inverse navbar-fixed-top">
        <div class="container-fluid">
            <div class="navbar-header">
                <button type="button" class="navbar-toggle collapsed" data-toggle="collapse" data-target="#navbar">
                    <span class="sr-only">Toggle navigation</span>
                    <span class="icon-bar"></span>
                    <span class="icon-bar"></span>
                    <span class="icon-bar"></span>
                </button>
                <a class="navbar-brand" href="/dashboard.html"><i class="glyphicon glyphicon-cloud"></i> IoT Portal</a>
            </div>
            <div id="navbar" class="navbar-collapse collapse">
                <ul class="nav navbar-nav">
                    <li class="active"><a href="/dashboard.html"><i class="glyphicon glyphicon-dashboard"></i> Dashboard</a></li>
                    <li><a href="/devices.html"><i class="glyphicon glyphicon-hdd"></i> Devices</a></li>
                    <li><a href="/admin.html"><i class="glyphicon glyphicon-cog"></i> Admin</a></li>
                </ul>
                <ul class="nav navbar-nav navbar-right">
                    <li><a id="userName" href="#"></a></li>
                    <li><a href="#" id="logoutBtn"><i class="glyphicon glyphicon-log-out"></i> Logout</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container-fluid" style="margin-top:60px;">
        <h2><i class="glyphicon glyphicon-dashboard"></i> Dashboard</h2>
        <hr>

        <!-- Search Form -->
        <div class="row">
            <div class="col-md-6">
                <form id="searchForm" class="form-inline">
                    <div class="form-group">
                        <label class="sr-only" for="searchQuery">Search Devices</label>
                        <input type="text" class="form-control" id="searchQuery" placeholder="Search devices...">
                    </div>
                    <button type="submit" class="btn btn-default"><i class="glyphicon glyphicon-search"></i> Search</button>
                </form>
            </div>
        </div>
        <br>

        <!-- Search Results (hidden by default) -->
        <div id="searchResults" class="panel panel-info" style="display:none;">
            <div class="panel-heading">
                <h3 class="panel-title"><i class="glyphicon glyphicon-search"></i> Search Results for: <span id="searchQueryDisplay"></span></h3>
            </div>
            <div class="panel-body" id="searchResultsBody">
            </div>
        </div>

        <!-- Stats Panels -->
        <div class="row">
            <div class="col-md-3">
                <div class="panel panel-success">
                    <div class="panel-heading">
                        <div class="row">
                            <div class="col-xs-3"><i class="glyphicon glyphicon-ok-circle" style="font-size:40px;"></i></div>
                            <div class="col-xs-9 text-right">
                                <div style="font-size:24px;" id="statOnline">0</div>
                                <div>Online</div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="panel panel-danger">
                    <div class="panel-heading">
                        <div class="row">
                            <div class="col-xs-3"><i class="glyphicon glyphicon-remove-circle" style="font-size:40px;"></i></div>
                            <div class="col-xs-9 text-right">
                                <div style="font-size:24px;" id="statOffline">0</div>
                                <div>Offline</div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="panel panel-warning">
                    <div class="panel-heading">
                        <div class="row">
                            <div class="col-xs-3"><i class="glyphicon glyphicon-exclamation-sign" style="font-size:40px;"></i></div>
                            <div class="col-xs-9 text-right">
                                <div style="font-size:24px;" id="statWarning">0</div>
                                <div>Warning</div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="panel panel-primary">
                    <div class="panel-heading">
                        <div class="row">
                            <div class="col-xs-3"><i class="glyphicon glyphicon-th" style="font-size:40px;"></i></div>
                            <div class="col-xs-9 text-right">
                                <div style="font-size:24px;" id="statTotal">0</div>
                                <div>Total Devices</div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Device Table -->
        <div class="panel panel-default">
            <div class="panel-heading">
                <h3 class="panel-title"><i class="glyphicon glyphicon-list"></i> Device Overview</h3>
            </div>
            <div class="panel-body">
                <div class="table-responsive">
                    <table class="table table-striped table-bordered table-hover">
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Name</th>
                                <th>Type</th>
                                <th>Location</th>
                                <th>Status</th>
                                <th>IP Address</th>
                                <th>Firmware</th>
                                <th>Last Seen</th>
                            </tr>
                        </thead>
                        <tbody id="deviceTableBody">
                            <tr><td colspan="8" class="text-center text-muted">Loading devices...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-2.2.4.min.js"></script>
    <script src="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.7/js/bootstrap.min.js"></script>
    <script src="/js/app.js"></script>
    <script>
    $(function(){
        checkAuth();
        loadDashboard();
    });
    </script>
</body>
</html>
